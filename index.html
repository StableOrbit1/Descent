window.syncProfileToFirebase = async function() {
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));

    if (!navigator.onLine || !db || !STATE.player.phone) {
        localStorage.setItem('descent_pending_profile_sync', 'true');
        return;
    }

    try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', STATE.player.phone);
        await setDoc(docRef, STATE.player, { merge: true });
        localStorage.removeItem('descent_pending_profile_sync');
    } catch (e) {
        console.error("Failed to sync profile. Queueing for later:", e);
        localStorage.setItem('descent_pending_profile_sync', 'true');
    }
}

function savePendingRound(roundPayload) {
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    pending.push(roundPayload);
    localStorage.setItem('descent_pending_rounds', JSON.stringify(pending));
}

window.syncPendingRounds = async function() {
    if (!navigator.onLine || !db || !STATE.player.phone) return;
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    if (pending.length === 0) return;

    let remaining = [];
    for (let roundPayload of pending) {
        try {
            const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
            await addDoc(roundsCol, { ...roundPayload, syncedAt: new Date().toISOString() });
        } catch (e) {
            console.error("Failed to sync queued round. Keeping in queue:", e);
            remaining.push(roundPayload);
        }
    }
    localStorage.setItem('descent_pending_rounds', JSON.stringify(remaining));
}

async function saveRoundToFirebase(roundData) {
    STATE.player.hasPlayedRound = true;
    STATE.player.roundCount++;
    window.checkAchievements(roundData);
    
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
    
    const roundPayload = { ...roundData, timestamp: new Date().toISOString() };

    if (!navigator.onLine || !db || !STATE.player.phone) {
        console.warn("Offline or DB unavailable. Queueing round locally.");
        savePendingRound(roundPayload);
        return;
    }

    try {
        const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
        await addDoc(roundsCol, roundPayload);
        await syncProfileToFirebase();
    } catch (e) {
        console.error("Failed to save round to Firebase, queueing locally:", e);
        savePendingRound(roundPayload);
    }
}

async function getAIAdvice(promptText, requiresJson = false) {
    if (!navigator.onLine) {
        if (requiresJson) throw new Error("Network offline.");
        return "Coach is offline. Trust your swing and stick to your pre-shot routine.";
    }
    if (!vertexAI) {
        if (requiresJson) throw new Error("Vertex AI not initialized. Check Firebase config.");
        return "Coach is offline (Vertex AI not initialized).";
    }
    
    const instruction = requiresJson 
        ? "You are a professional golf data analyst. Return ONLY valid JSON. Strictly adhere to the requested schema. No prose."
        : "You are a professional golf 'Corner Man'. Give SALIENT, CRISP coaching advice. Format your response using basic HTML (like <strong> and <br>) for beautiful readability in a web app. Use emojis for bullet points instead of <ul>/<li>.";

    const modelConfig = { 
        model: "gemini-2.5-flash",
        systemInstruction: instruction
    };
    
    if (requiresJson) {
        modelConfig.generationConfig = { responseMimeType: "application/json" };
    }

    try {
        const model = getGenerativeModel(vertexAI, modelConfig);
        
        const generate = async (retries = 3, delay = 1000) => {
            try {
                const result = await model.generateContent(promptText);
                const text = result.response.text();
                if (!text) throw new Error("Empty response from AI");
                return text;
            } catch (error) {
                console.warn(`AI Retry Attempt Failed (${3 - retries}/3):`, error.message);
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, delay));
                    return generate(retries - 1, delay * 2);
                }
                throw error;
            }
        };

        return await generate();
    } catch (err) {
        console.error("Detailed AI Error:", err);
        if (requiresJson) throw err;
        return `AI Error: ${err.message || String(err)}.`;
    }
}

window.calculateRoundSG = function(holes) {
    let sg = { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    
    holes.forEach(h => {
        let strokes_lost = h.par - h.totalStrokes;
        let putting_sg = 2.0 - h.putts;
        let offTee_sg = 0;
        if (h.par > 3 && h.shots.length > 0) {
            let teeShot = h.shots[0];
            if (teeShot.ob) offTee_sg = -2.0;
            else if (teeShot.lie !== 'Fairway') offTee_sg = -0.5;
        }
        let shortGame_sg = 0;
        let shortShots = h.shots.filter(s => s.distance <= 50 && s.club !== 'Putter');
        if (shortShots.length > 1) { shortGame_sg = -(shortShots.length - 1); }
        shortShots.forEach(s => { if(s.ob) shortGame_sg -= 1.0; });
        let approach_sg = strokes_lost - (putting_sg + offTee_sg + shortGame_sg);

        sg.putting += putting_sg;
        sg.offTee += offTee_sg;
        sg.shortGame += shortGame_sg;
        sg.approach += approach_sg;
    });
    
    let scale = 18 / Math.max(1, holes.length);
    return {
        putting: sg.putting * scale,
        offTee: sg.offTee * scale,
        shortGame: sg.shortGame * scale,
        approach: sg.approach * scale
    };
}

const rootEl = document.getElementById('app-root');
const navEl = document.getElementById('bottom-nav');

window.switchView = function(viewName) {
    STATE.currentView = viewName;
    render();
    
    const hiddenViews = ['welcome', 'onboarding', 'welcome_sequence', 'play_active', 'post_round', 'coach_corner'];
    if (hiddenViews.includes(viewName)) {
        if(navEl) navEl.classList.add('hidden');
    } else {
        if(navEl) {
            navEl.classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.tab === viewName) {
                    btn.classList.remove('text-slate-400'); btn.classList.add('text-cyan-500');
                } else {
                    btn.classList.add('text-slate-400'); btn.classList.remove('text-cyan-500');
                }
            });
        }
    }
    
    if (viewName === 'coach' || viewName === 'coach_corner') {
        setTimeout(() => {
            const chatBox = document.getElementById(viewName === 'coach' ? 'chat-scroll-area' : 'corner-chat-area');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }, 50);
    }
}

window.render = function() {
    const container = document.getElementById('app-root');
    const currentScroll = container ? container.scrollTop : 0;
    
    let html = '';
    switch(STATE.currentView) {
        case 'welcome': html = renderWelcome(); break;
        case 'onboarding': html = renderOnboarding(); break;
        case 'welcome_sequence': html = renderWelcomeSequence(); break;
        case 'learn': html = renderLearn(); break;
        case 'practice': html = renderPractice(); break;
        case 'checkin': html = renderCheckIn(); break;
        case 'play': html = renderPlayIntro(); break;
        case 'play_active': html = renderPlayActive(); break;
        case 'coach_corner': html = renderCoachCorner(); break;
        case 'post_round': html = renderPostRound(); break;
        case 'progress': html = renderProgress(); break;
        case 'coach': html = renderCoach(); break;
    }
    
    if (rootEl) {
        rootEl.innerHTML = html;
        // Scroll lock restoration
        const newContainer = document.getElementById('app-root');
        if (newContainer && (STATE.currentView === 'checkin' || STATE.currentView === 'post_round' || STATE.currentView === 'progress' || STATE.currentView === 'practice' || STATE.currentView === 'learn')) {
            newContainer.scrollTop = currentScroll;
        }
    }
}

function renderPlayActive() {
    const round = STATE.activeRound;
    if (!round) return '';
    const hole = STATE.player.courseHoles[round.holeIndex];
    const club = STATE.player.bag[round.selectedClubIndex];
    const outs = round.shotOutcomes;

    const completedHoles = round.holesLog.length;
    const currentTotalStrokes = round.holesLog.reduce((s, h) => s + h.totalStrokes, 0) + round.currentHoleShots.length + round.penaltyStrokes + (round.tempPuttCount || 0);
    const scoreToPar = round.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0);
    const scoreToParStr = scoreToPar > 0 ? `+${scoreToPar}` : scoreToPar === 0 ? 'E' : scoreToPar;
    const totalPutts = round.holesLog.reduce((s, h) => s + h.putts, 0);
    const ppg = completedHoles > 0 ? (totalPutts / completedHoles).toFixed(1) : '0.0';
    const totalGir = round.holesLog.filter(h => h.isGir).length;
    const girPct = completedHoles > 0 ? Math.round((totalGir / completedHoles) * 100) : '0';

    let interactions = '';
    if (round.holeState === 'fairway') {
        interactions = `
            <div class="mb-4 text-center">
                <div class="text-slate-500 font-bold uppercase tracking-widest text-[11px] mb-2">Choose Club</div>

            <div class="space-y-2 mb-4">
                <div class="flex gap-2">
                    <button onclick="setOutcome('dir', 'Left')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.dir==='Left'?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-500 border-slate-200 shadow-sm'}">Left</button>

                    <button onclick="setOutcome('lie', 'Green')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.lie==='Green'?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-500 border-slate-200 shadow-sm'}">Green</button>

                <div class="flex gap-2">
                    <button onclick="setOutcome('cont', 'Miss-hit')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Miss-hit'?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-500 border-slate-200 shadow-sm'}">Miss-hit</button>
                    <button onclick="setOutcome('cont', 'Good Strike')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Good Strike'?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-500 border-slate-200 shadow-sm'}">Good</button>
                    <button onclick="setOutcome('cont', 'Dreamy')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Dreamy'?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-500 border-slate-200 shadow-sm'}">Dreamy</button>
                </div>
                <button onclick="setOutcome('ob', ${!outs.ob})" class="w-full py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.ob?'bg-red-500 text-white border-red-500':'bg-white text-slate-500 border-slate-200 shadow-sm'}">${outs.ob ? 'OB (Penalty Added)' : 'Mark as OB'}</button>
            </div>
            <button onclick="recordFairwayShot()" class="w-full bg-cyan-400 hover:bg-cyan-500 text-white font-bold py-3 rounded-xl transition-transform active:scale-95 shadow-md mt-auto uppercase tracking-widest">Record Shot</button>
        `;
    } else if (round.holeState === 'green') {
        interactions = `
            <div class="text-center mb-4 mt-2">
                <div class="text-cyan-600 text-xs font-bold uppercase tracking-widest mb-4">On the Green</div>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="reviewHole(0)" class="col-span-2 py-4 text-sm font-bold uppercase tracking-widest rounded-2xl border-2 ${round.tempPuttCount===0?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-700 border-slate-200'}">Hole Out (0 Putts)</button>
                    <button onclick="reviewHole(1)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===1?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-700 border-slate-200'}">1</button>
                    <button onclick="reviewHole(2)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===2?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-700 border-slate-200'}">2</button>
                    <button onclick="reviewHole(3)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===3?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-700 border-slate-200'}">3</button>
                    <button onclick="reviewHole(4)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===4?'bg-cyan-100 text-cyan-800 border-cyan-300':'bg-white text-slate-700 border-slate-200'}">4+</button>
                </div>
                <textarea id="hole-comment" placeholder="Any notes on this hole?" class="w-full bg-white border border-slate-200 focus:border-cyan-500 rounded-xl p-3 text-sm text-slate-800 outline-none h-20 resize-none mb-2 shadow-sm"></textarea>
            </div>
        `;
    } else if (round.holeState === 'review') {
        interactions = `
            <div class="mb-4">
                <div class="text-cyan-600 text-xs font-bold uppercase tracking-widest mb-4 text-center">Review & Edit Hole</div>
                <div class="space-y-3 mb-4">
                    ${round.currentHoleShots.length === 0 ? '<div class="text-center text-xs text-slate-400">No shots recorded.</div>' : ''}
                    ${round.currentHoleShots.map((shot, idx) => `
                        <div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm relative">
                            <div class="flex justify-between items-center mb-3">
                                <span class="text-xs font-bold text-slate-800 uppercase tracking-widest">Shot ${idx + 1}</span>
                                <div class="flex items-center gap-3">
                                    <label class="flex items-center gap-1 text-[10px] uppercase ${shot.ob ? 'text-red-500' : 'text-slate-500'} font-bold cursor-pointer">

                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-2 text-xs">
                                <div><div class="text-[9px] text-slate-400 uppercase font-bold mb-1">Club</div><select onchange="updateReviewShot(${idx}, 'club', this.value)" class="w-full bg-slate-50 text-slate-800 p-1.5 rounded border border-slate-200 outline-none">${STATE.player.bag.map(c => `<option value="${c.name}" ${c.name === shot.club ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
                                <div><div class="text-[9px] text-slate-400 uppercase font-bold mb-1">Lie</div><select onchange="updateReviewShot(${idx}, 'lie', this.value)" class="w-full bg-slate-50 text-slate-800 p-1.5 rounded border border-slate-200 outline-none"><option value="Fairway" ${shot.lie === 'Fairway' ? 'selected' : ''}>Fairway</option><option value="Rough" ${shot.lie === 'Rough' ? 'selected' : ''}>Rough</option><option value="Green" ${shot.lie === 'Green' ? 'selected' : ''}>Green</option></select></div>
                                <div><div class="text-[9px] text-slate-400 uppercase font-bold mb-1">Direction</div><select onchange="updateReviewShot(${idx}, 'direction', this.value)" class="w-full bg-slate-50 text-slate-800 p-1.5 rounded border border-slate-200 outline-none"><option value="Left" ${shot.direction === 'Left' ? 'selected' : ''}>Left</option><option value="Straight" ${shot.direction === 'Straight' ? 'selected' : ''}>Straight</option><option value="Right" ${shot.direction === 'Right' ? 'selected' : ''}>Right</option></select></div>
                                <div><div class="text-[9px] text-slate-400 uppercase font-bold mb-1">Distance</div><select onchange="updateReviewShot(${idx}, 'distOut', this.value)" class="w-full bg-slate-50 text-slate-800 p-1.5 rounded border border-slate-200 outline-none"><option value="Short" ${shot.distOut === 'Short' ? 'selected' : ''}>Short</option><option value="At Dist" ${shot.distOut === 'At Dist' ? 'selected' : ''}>At Dist</option><option value="Long" ${shot.distOut === 'Long' ? 'selected' : ''}>Long</option></select></div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="bg-white p-4 rounded-xl border border-slate-200 mb-4 flex items-center justify-between shadow-sm">
                    <span class="text-xs font-bold text-slate-800 uppercase tracking-widest">Total Putts</span>
                    <div class="flex items-center gap-3">
                        <button onclick="updateReviewPutts(-1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center border border-slate-200 active:scale-95 transition-transform">-</button>
                        <span class="text-xl font-black text-cyan-600 w-6 text-center">${round.tempPuttCount}</span>
                        <button onclick="updateReviewPutts(1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-700 flex items-center justify-center border border-slate-200 active:scale-95 transition-transform">+</button>
                    </div>
                </div>
                <button onclick="commitHole()" class="w-full bg-cyan-400 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl transition-transform active:scale-95 shadow-md uppercase tracking-widest">Commit Hole Data</button>
                <button onclick="backToGreen()" class="w-full mt-3 bg-transparent text-slate-400 text-xs font-bold uppercase tracking-widest hover:text-slate-600 transition-colors">Back to Green</button>
            </div>
        `;
    }

    return `
    <div class="flex flex-col h-full bg-slate-50">
        <div class="bg-white p-4 rounded-b-2xl border-b border-slate-200 shadow-sm shrink-0">
            <div class="flex justify-between items-center mb-4">
                <div><span class="text-cyan-600 font-bold uppercase tracking-widest text-[10px]">Hole ${hole.number}</span><h2 class="text-2xl font-serif font-bold text-slate-900">Par ${hole.par}</h2></div>
                <div class="text-right"><span class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Total Strokes</span><div class="text-3xl font-serif font-bold text-yellow-500">${currentTotalStrokes}</div></div>
            </div>
            <div class="grid grid-cols-4 gap-2 text-center border-t border-slate-100 pt-3">
                <div><div class="text-[9px] uppercase font-bold text-slate-400 mb-1">To Par</div><div class="text-sm font-black ${scoreToPar > 0 ? 'text-red-500' : 'text-cyan-500'}">${scoreToParStr}</div></div>
                <div><div class="text-[9px] uppercase font-bold text-slate-400 mb-1">PPG</div><div class="text-sm font-black text-slate-800">${ppg}</div></div>
                <div><div class="text-[9px] uppercase font-bold text-slate-400 mb-1">GIR %</div><div class="text-sm font-black text-cyan-500">${girPct}%</div></div>
                <div><div class="text-[9px] uppercase font-bold text-slate-400 mb-1">Holes</div><div class="text-sm font-black text-slate-800">${completedHoles}</div></div>
            </div>
        </div>
        <div class="p-4 flex-1 flex flex-col hide-scrollbar overflow-y-auto pb-4">
            ${interactions}
            ${round.holeState === 'fairway' && round.currentHoleShots.length > 0 ? `
                <div class="mt-4 text-center">
                    <button onclick="undoLastShot()" class="text-slate-400 text-[10px] font-bold uppercase tracking-widest hover:text-slate-600 transition-colors">
                        <svg class="inline w-3 h-3 mr-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg> Undo Last Shot
                    </button>
                </div>
            ` : ''}
        </div>
    </div>`;
}

                <button onclick="sendCornerMessage()" class="w-12 rounded-xl bg-white border border-slate-300 hover:border-cyan-500 flex items-center justify-center text-cyan-600 transition-colors shadow-sm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>

function renderPostRound() {
    const r = STATE.activeRound;
    const holes = r.holesLog;
    const totalStrokes = holes.reduce((s, h) => s + h.totalStrokes, 0);
    const totalPar = holes.reduce((s, h) => s + h.par, 0);
    const toPar = totalStrokes - totalPar;
    const toParStr = toPar > 0 ? `+${toPar}` : toPar === 0 ? 'E' : toPar;

    const drivableHoles = holes.filter(h => h.par > 3);
    const fairwaysHit = drivableHoles.filter(h => h.shots[0]?.lie === 'Fairway').length;
    const fairwayPct = drivableHoles.length > 0 ? Math.round((fairwaysHit / drivableHoles.length) * 100) : 0;
    
    const totalPutts = holes.reduce((s, h) => s + h.putts, 0);
    const ppg = (totalPutts / holes.length).toFixed(1);

    const parStats = { 3: { s: 0, c: 0 }, 4: { s: 0, c: 0 }, 5: { s: 0, c: 0 } };
    holes.forEach(h => { parStats[h.par].s += h.totalStrokes; parStats[h.par].c++; });

    const filteredClub = r.summaryFilter || 'All';
    let allShots = [];
    holes.forEach(h => h.shots.forEach(s => allShots.push(s)));
    if (filteredClub !== 'All') allShots = allShots.filter(s => s.club === filteredClub);

    const getPct = (condFn) => allShots.length > 0 ? Math.round((allShots.filter(condFn).length / allShots.length) * 100) : 0;

    const renderCategory = (title, items) => `
        <div class="mb-3">
            <div class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">${title}</div>
            <div class="flex gap-2">
                ${items.map(item => `
                    <div class="flex-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-center shadow-sm">
                        <div class="text-lg font-black" style="color: ${item.color}">${item.pct}%</div>
                        <div class="text-[8px] uppercase font-bold text-slate-400 mt-0.5">${item.label}</div>
                    </div>
                `).join('')}
            </div>
        </div>`;

    const clubsInBag = [...new Set(STATE.player.bag.map(c => c.name))];
    const isPutter = filteredClub === 'Putter';

    let suggestionsHTML = '';
    if (r.newLearn?.length > 0 || r.newPractice?.length > 0) {
        suggestionsHTML = `
            <div class="mb-10 animate-fade-in">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">Coach Plan Updates</h3>
                <div class="space-y-3">
                    ${r.newLearn.map((item, idx) => `
                        <div class="bg-white p-4 rounded-xl border border-cyan-200 shadow-sm">
                            <span class="text-[10px] uppercase font-black text-cyan-600 mb-2 block tracking-widest">New to Learn</span>
                            <p class="text-sm text-slate-800 mb-4 leading-relaxed">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('learn', ${idx}, 'add')" class="flex-1 bg-cyan-100 hover:bg-cyan-200 text-cyan-800 text-xs font-bold py-2.5 rounded-lg transition-colors">Add to Hub</button>
                                <button onclick="handlePlanAction('learn', ${idx}, 'ignore')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2.5 rounded-lg transition-colors">Ignore</button>
                            </div>
                        </div>
                    `).join('')}
                    ${r.newPractice.map((item, idx) => `
                        <div class="bg-white p-4 rounded-xl border border-cyan-200 shadow-sm">
                            <span class="text-[10px] uppercase font-black text-cyan-600 mb-2 block tracking-widest">New to Practice</span>
                            <p class="text-sm text-slate-800 mb-4 leading-relaxed">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('practice', ${idx}, 'add')" class="flex-1 bg-cyan-100 hover:bg-cyan-200 text-cyan-800 text-xs font-bold py-2.5 rounded-lg transition-colors">Add to Hub</button>
                                <button onclick="handlePlanAction('practice', ${idx}, 'ignore')" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-bold py-2.5 rounded-lg transition-colors">Ignore</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    let pithyAdviceHTML = '';
    if (r.pithyAdvice) {
        pithyAdviceHTML = `
            <div class="bg-yellow-50 p-6 rounded-2xl border border-yellow-200 mb-10 shadow-sm text-center animate-fade-in">
                <div class="text-3xl mb-3">💡</div>
                <p class="text-slate-800 font-medium leading-relaxed italic text-lg">
                    "${r.pithyAdvice}"
                </p>
            </div>
        `;
    }

    let aiErrorBannerHTML = '';
    if (r.aiFailed) {
        aiErrorBannerHTML = `
            <div class="bg-red-50 p-4 rounded-xl border border-red-200 mb-8 shadow-sm flex items-start gap-3 animate-fade-in">
                <div class="text-red-500 text-xl mt-0.5">⚠️</div>
                <div class="w-full">
                    <div class="text-red-600 text-xs font-bold uppercase tracking-widest mb-1">AI Connection Failed</div>
                    <p class="text-red-500/80 text-xs leading-relaxed mb-3">
                        Coach couldn't reach the analysis servers. Your data is saved safely, but we've generated baseline default drills and scores for this round.
                    </p>
                    <div class="bg-white p-3 rounded-lg border border-red-100 text-[10px] text-red-500 font-mono break-words w-full">
                        <strong>Technical Details:</strong><br/>
                        ${r.aiErrorMessage || 'Unknown API Error'}
                    </div>
                </div>
            </div>
        `;
    }

    return `
    <div class="flex flex-col h-full bg-slate-50 animate-fade-in p-6 pb-24 overflow-y-auto hide-scrollbar">
        <div class="text-center mt-4 mb-8">
            <h1 class="text-sm font-black uppercase tracking-[0.2em] text-cyan-600 mb-2">Round Summary</h1>
            <div class="flex justify-center items-baseline gap-4">
                <span class="text-7xl font-black text-slate-900">${totalStrokes}</span>
                <span class="text-2xl font-bold ${toPar > 0 ? 'text-red-500' : 'text-cyan-500'}">${toParStr}</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Fairways Hit</div>
                <div class="text-3xl font-black text-slate-800">${fairwayPct}%</div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Putts Per Green</div>
                <div class="text-3xl font-black text-slate-800">${ppg}</div>
            </div>
        </div>

        ${aiErrorBannerHTML}

        <!-- AI Core Proficiency Scoring -->
        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">Round Proficiency (AI Score)</h3>
            <div class="bg-white p-6 rounded-2xl border border-cyan-100 space-y-4 shadow-sm">
                ${r.roundProficiency ? Object.keys(STATE.player.coreAreas).map(area => {
                    const rawScore = r.roundProficiency[area];
                    const score = (typeof rawScore === 'number' && !isNaN(rawScore)) ? Math.max(1, Math.min(5, rawScore)) : 3;
                    return `
                    <div>
                        <div class="flex justify-between text-[10px] font-bold uppercase mb-1.5">
                            <span class="text-slate-600">${CORE_AREA_INFO[area] ? area.replace(/([A-Z])/g, ' $1').trim() : area}</span>
                            <span class="text-cyan-600">${score}/5</span>
                        </div>
                        <div class="prof-bar-bg">
                            <div class="prof-bar-fill" style="width: ${(score / 5) * 100}%"></div>
                        </div>
                    </div>
                    `
                }).join('') : `
                    <div class="flex gap-2 items-center text-slate-400 py-4">
                        <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] uppercase font-bold tracking-widest">Generating Proficiency Scores...</span>
                    </div>
                `}
            </div>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-500">Shot Distribution</h3>
                <select onchange="updateSummaryFilter(this.value)" class="bg-white text-slate-800 text-[10px] font-bold uppercase p-2 px-3 rounded-lg border border-slate-200 outline-none focus:border-cyan-500 shadow-sm">
                    <option value="All">All Clubs</option>
                    ${clubsInBag.map(c => `<option value="${c}" ${filteredClub === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
            </div>

            ${isPutter ? `
                <div class="bg-white p-8 rounded-2xl border border-slate-200 text-center shadow-sm">
                    <div class="text-[10px] font-black text-slate-400 uppercase mb-2">Total Putts</div>
                    <div class="text-6xl font-black text-slate-800 mb-6">${totalPutts}</div>
                    <div class="h-px bg-slate-100 w-full mb-6"></div>
                    <div class="text-3xl font-black text-cyan-500">${ppg} PPG</div>
                </div>
            ` : `
                <div class="bg-white p-4 rounded-xl border border-slate-200 space-y-4 shadow-sm">
                    ${allShots.length === 0 ? `<div class="text-center text-xs text-slate-400 py-4">No shots recorded for this selection.</div>` : `
                        ${renderCategory('Direction', [
                            {label: 'Left', pct: getPct(s => s.direction === 'Left'), color: '#64748b'},
                            {label: 'Straight', pct: getPct(s => s.direction === 'Straight'), color: '#06b6d4'},
                            {label: 'Right', pct: getPct(s => s.direction === 'Right'), color: '#64748b'}
                        ])}
                        ${renderCategory('Distance', [
                            {label: 'Short', pct: getPct(s => s.distOut === 'Short'), color: '#64748b'},
                            {label: 'At Dist', pct: getPct(s => s.distOut === 'At Dist'), color: '#06b6d4'},
                            {label: 'Long', pct: getPct(s => s.distOut === 'Long'), color: '#64748b'}
                        ])}
                        ${renderCategory('Contact', [
                            {label: 'Miss-hit', pct: getPct(s => s.contact === 'Miss-hit'), color: '#ef4444'},
                            {label: 'Good', pct: getPct(s => s.contact === 'Good Strike'), color: '#06b6d4'},
                            {label: 'Dreamy', pct: getPct(s => s.contact === 'Dreamy'), color: '#06b6d4'}
                        ])}
                        ${renderCategory('Resulting Lie', [
                            {label: 'Rough', pct: getPct(s => s.lie === 'Rough'), color: '#eab308'},
                            {label: 'Fairway', pct: getPct(s => s.lie === 'Fairway'), color: '#06b6d4'},
                            {label: 'Green', pct: getPct(s => s.lie === 'Green'), color: '#06b6d4'}
                        ])}
                        <div class="flex justify-between items-center pt-2 border-t border-slate-100">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">OB Hits</span>
                            <span class="text-sm font-black text-red-500">${allShots.filter(s => s.ob).length} (${getPct(s => s.ob)}%)</span>
                        </div>
                    `}
                </div>
            `}
        </div>

        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-500 mb-4">Hole Performance</h3>
            <div class="space-y-2">
                ${[3,4,5].map(p => {
                    const avg = parStats[p].c > 0 ? (parStats[p].s / parStats[p].c).toFixed(1) : '0.0';
                    const diff = (parseFloat(avg) - p).toFixed(1);
                    return `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center border border-slate-200 shadow-sm">
                        <div><span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Par ${p} Avg</span><span class="text-lg font-black text-slate-800">${avg}</span></div>
                        <div class="text-right"><span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Vs Par</span><span class="text-lg font-black ${diff > 0 ? 'text-red-500' : 'text-cyan-500'}">${diff > 0 ? '+' + diff : diff === '0.0' ? 'E' : diff}</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>

        ${pithyAdviceHTML}
        ${suggestionsHTML}

        <button onclick="finalizeRound()" class="w-full bg-slate-800 border border-slate-700 text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-md transition-transform active:scale-95 hover:bg-slate-900">Finalize & Sync</button>
    </div>`;
}

function renderProgress() {
    const pSg = STATE.player.sgStats || { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    const statsArr = [
        { label: 'Putting', value: pSg.putting, key: 'putting' },
        { label: 'Approach', value: pSg.approach, key: 'approach' },
        { label: 'Short Game', value: pSg.shortGame, key: 'shortGame' },
        { label: 'Off the Tee', value: pSg.offTee, key: 'offTee' }
    ];
    
    statsArr.sort((a, b) => a.value - b.value);
    const rankColors = ['#ef4444', '#eab308', '#a855f7', '#06b6d4']; // Tailwind red-500, yellow-500, purple-500, cyan-500
    statsArr.forEach((s, i) => s.color = rankColors[i]);

    const maxAbsVal = Math.max(0.1, ...statsArr.map(s => Math.abs(s.value)));

    return `
    <div class="flex flex-col h-full p-6 animate-fade-in bg-slate-50">
        <h1 class="text-2xl font-serif font-bold mb-6 text-slate-900">Progress</h1>
        ${STATE.player.roundCount === 0 ? `
            <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 mb-6 shadow-sm">
                <p class="text-yellow-700 text-sm leading-relaxed">
                    <strong>Welcome to Progress!</strong> Since you haven't logged a round yet, your Learn and Practice plans are based purely on your initial self-assessment. Play a round to start unlocking data-driven insights!
                </p>
            </div>
        ` : ''}
        <div class="bg-white border border-slate-200 shadow-sm rounded-xl p-5 mb-4">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-1">Estimated SG (vs Scratch)</h3>
            <p class="text-xs text-slate-400 mb-6">Where you're losing strokes per round</p>
            <div class="space-y-4">
                ${statsArr.map(stat => `
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-xs font-bold text-slate-700">${stat.label}</span>
                        <div class="flex-1 h-2 bg-slate-100 border border-slate-200 rounded-full relative overflow-hidden"><div class="absolute top-0 left-0 h-full transition-all duration-1000" style="width: ${STATE.player.roundCount > 0 ? (Math.min(100, Math.abs(stat.value / maxAbsVal) * 100)) + '%' : '0%'}; background-color: ${stat.color}"></div></div>
                        <span class="w-10 text-right text-xs font-bold" style="color: ${stat.color}">${STATE.player.roundCount > 0 ? (stat.value > 0 ? '+' : '') + stat.value.toFixed(1) : '0.0'}</span>
                    </div>
                `).join('')}
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white border border-slate-200 shadow-sm p-4 rounded-xl"><div class="text-3xl font-bold text-slate-800">${STATE.player.roundCount}</div><div class="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Rounds Logged</div></div>
            <div class="bg-white border border-slate-200 shadow-sm p-4 rounded-xl"><div class="text-3xl font-bold text-slate-800">${STATE.player.sessionsCount}</div><div class="text-[10px] text-slate-400 uppercase tracking-wider mt-1">Total Sessions</div></div>
            <div class="bg-white border border-slate-200 shadow-sm p-4 rounded-xl"><div class="text-3xl font-bold text-cyan-600">${STATE.player.drillsPassed}</div><div class="text-[10px] text-cyan-600 uppercase tracking-wider mt-1">Drills Passed</div></div>
            <div class="bg-white border border-slate-200 shadow-sm p-4 rounded-xl"><div class="text-3xl font-bold text-yellow-500">${STATE.player.achievements.length}</div><div class="text-[10px] text-yellow-500 uppercase tracking-wider mt-1">Achievements</div></div>
        </div>
        ${STATE.player.achievements.length > 0 ? `
            <div class="bg-white border border-slate-200 shadow-sm rounded-xl p-5 mb-8">
                <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Trophy Room</h3>
                <div class="space-y-3">
                    ${STATE.player.achievements.map(a => `
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <div class="text-2xl">${a.icon}</div>
                            <div class="font-bold text-sm text-slate-800">${a.title}</div>
                        </div>

                </div>
            </div>
        ` : ''}
    </div>`;
}

function renderGarminSection() {
    if (STATE.garminLoading) return `<div class="mt-4 text-center text-cyan-600 text-[10px] font-bold uppercase tracking-widest animate-pulse">Parsing CSV Data...</div>`;
    
    let html = '';
    if (STATE.garminError) html += `<div class="mt-4 text-red-600 text-xs font-semibold text-center border border-red-200 bg-red-50 p-2 rounded-lg">${STATE.garminError}</div>`;

window.suggestClubIndex = function(distance) {
    const bag = STATE.player.bag;
    if (distance <= 30) {
        const idx = bag.findIndex(c => c.id === 'putter');
        return idx >= 0 ? idx : 0;
    }
    let closestIdx = -1;
    let smallestDiff = Infinity;
    for (let i = 0; i < bag.length; i++) {
        if (bag[i].id === 'putter') continue;
        const diff = bag[i].distance - distance;
        if (diff >= 0 && diff < smallestDiff) {
            smallestDiff = diff; closestIdx = i;
        }
    }
    if (closestIdx === -1) {
        let maxDist = -1;
        for (let i = 0; i < bag.length; i++) {
            if (bag[i].id === 'putter') continue;
            if (bag[i].distance > maxDist) { maxDist = bag[i].distance; closestIdx = i; }
        }
    }
    return closestIdx === -1 ? 0 : closestIdx;
}

window.recordFairwayShot = () => {
    const r = STATE.activeRound;
    const hole = STATE.player.courseHoles[r.holeIndex];
    const club = STATE.player.bag[r.selectedClubIndex];
    const out = r.shotOutcomes;
    const shotNumber = r.currentHoleShots.length + 1;
    const _previousDistance = r.currentShotDistance;
    const _previousPenalties = r.penaltyStrokes;

    if (out.lie === 'Green') {
        if (shotNumber <= (hole.par - 2)) r.currentHoleIsGir = true;
        r.holeState = 'green';
    }

    r.currentHoleShots.push({ 
        club: club.name, direction: out.dir, distOut: out.dist, lie: out.lie, contact: out.cont, ob: out.ob, distance: club.distance,
        _previousDistance, _previousPenalties
    });

    if (out.ob) r.penaltyStrokes += 1;
    if (r.holeState !== 'green') {
        const remaining = Math.max(0, r.currentShotDistance - club.distance);
        r.currentShotDistance = remaining;
        r.selectedClubIndex = suggestClubIndex(remaining);
        r.shotOutcomes = { dir: 'Straight', dist: 'At Dist', lie: 'Fairway', cont: 'Good Strike', ob: false };
    }
    saveLocalRoundState(); render();
}

window.undoLastShot = () => {
    const r = STATE.activeRound;
    if (!r || r.currentHoleShots.length === 0) return;
    if (r.holeState === 'green') { r.holeState = 'fairway'; r.currentHoleIsGir = false; }
    const lastShot = r.currentHoleShots.pop();
    r.currentShotDistance = lastShot._previousDistance;
    r.penaltyStrokes = lastShot._previousPenalties;
    r.selectedClubIndex = suggestClubIndex(r.currentShotDistance);
    r.shotOutcomes = { dir: 'Straight', dist: 'At Dist', lie: 'Fairway', cont: 'Good Strike', ob: false };
    saveLocalRoundState(); render();
}

window.commitHole = async () => {
    const r = STATE.activeRound;
    const hole = STATE.player.courseHoles[r.holeIndex];

    r.penaltyStrokes = r.currentHoleShots.filter(s => s.ob).length;
    r.currentHoleIsGir = false;
    r.currentHoleShots.forEach((s, idx) => {
        if (s.lie === 'Green' && (idx + 1) <= (hole.par - 2)) r.currentHoleIsGir = true;
    });

    r.holesLog.push({
        number: hole.number, par: hole.par,
        shots: JSON.parse(JSON.stringify(r.currentHoleShots)), 
        putts: r.tempPuttCount, penalties: r.penaltyStrokes,
        totalStrokes: r.currentHoleShots.length + r.tempPuttCount + r.penaltyStrokes,
        isGir: r.currentHoleIsGir, comment: r.tempComment
    });

    if (hole.number === 18) {
        saveLocalRoundState(); 
        const roundSG = window.calculateRoundSG(r.holesLog);
        switchView('post_round');
        
        if (STATE.player.roundCount === 0) {
            STATE.player.sgStats = roundSG;
        } else {
            STATE.player.sgStats.putting = (STATE.player.sgStats.putting * 0.7) + (roundSG.putting * 0.3);
            STATE.player.sgStats.offTee = (STATE.player.sgStats.offTee * 0.7) + (roundSG.offTee * 0.3);
            STATE.player.sgStats.shortGame = (STATE.player.sgStats.shortGame * 0.7) + (roundSG.shortGame * 0.3);
            STATE.player.sgStats.approach = (STATE.player.sgStats.approach * 0.7) + (roundSG.approach * 0.3);
        }

        if (!STATE.player.historicalMisses) STATE.player.historicalMisses = {};
        r.holesLog.forEach(h => {
            h.shots.forEach(s => {
                if (s.club === 'Putter') return;
                if (!STATE.player.historicalMisses[s.club]) STATE.player.historicalMisses[s.club] = { Left:0, Right:0, Short:0, Long:0 };
                if (s.direction === 'Left') STATE.player.historicalMisses[s.club].Left++;
                if (s.direction === 'Right') STATE.player.historicalMisses[s.club].Right++;
                if (s.distOut === 'Short') STATE.player.historicalMisses[s.club].Short++;
                if (s.distOut === 'Long') STATE.player.historicalMisses[s.club].Long++;
            });
        });

        const totalStrokes = r.holesLog.reduce((s, h) => s + h.totalStrokes, 0);
        const totalPar = r.holesLog.reduce((s, h) => s + h.par, 0);
        const toPar = totalStrokes - totalPar;
        const totalPutts = r.holesLog.reduce((s, h) => s + h.putts, 0);
        const ppg = (totalPutts / r.holesLog.length).toFixed(1);
        const drivableHoles = r.holesLog.filter(h => h.par > 3);
        const fairwaysHit = drivableHoles.filter(h => h.shots[0]?.lie === 'Fairway').length;
        const fairwayPct = drivableHoles.length > 0 ? Math.round((fairwaysHit / drivableHoles.length) * 100) : 0;

        if (!STATE.player.roundHistory) STATE.player.roundHistory = [];
        STATE.player.roundHistory.unshift({
            date: r.startTime || new Date().toISOString(),
            course: STATE.player.courseName, score: totalStrokes, toPar: toPar, ppg: ppg, fairwayPct: fairwayPct
        });

        await saveRoundToFirebase({ course: STATE.player.courseName, holes: r.holesLog, roundSG: roundSG });
        await performFinalAnalysis(roundSG);
        
    } else if (hole.number % 3 === 0) {
        r.isCoachTyping = true;
        saveLocalRoundState();
        switchView('coach_corner');
        
        const next3 = STATE.player.courseHoles.slice(r.holeIndex + 1, r.holeIndex + 4);
        const drivableHoles = r.holesLog.filter(h => h.par > 3);
        const fairwaysHit = drivableHoles.filter(h => h.shots[0]?.lie === 'Fairway').length;
        const fairwayPct = drivableHoles.length > 0 ? Math.round((fairwaysHit / drivableHoles.length) * 100) : 0;
        let obCount = 0; r.holesLog.forEach(h => h.shots.forEach(s => { if (s.ob) obCount++; }));

        const currentStats = {
            totalStrokes: r.holesLog.reduce((s, h) => s + h.totalStrokes, 0),
            toPar: r.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0),
            ppg: (r.holesLog.reduce((s, h) => s + h.putts, 0) / r.holesLog.length).toFixed(1),
            gir: Math.round((r.holesLog.filter(h => h.isGir).length / r.holesLog.length) * 100),
            fairwayPct: fairwayPct, obCount: obCount
        };

        let roundMisses = { Left:0, Right:0, Short:0, Long:0 };
        r.holesLog.forEach(h => h.shots.forEach(s => {
            if(s.direction === 'Left') roundMisses.Left++;
            if(s.direction === 'Right') roundMisses.Right++;
            if(s.distOut === 'Short') roundMisses.Short++;
            if(s.distOut === 'Long') roundMisses.Long++;
        }));
        let topRoundMiss = Object.keys(roundMisses).reduce((a, b) => roundMisses[a] > roundMisses[b] ? a : b);
        let currentTendency = roundMisses[topRoundMiss] > 0 ? topRoundMiss : "None";
        
        const prompt = `PLAYER CONTEXT: Driving: ${STATE.player.coreAreas.driving}/5, Putting: ${STATE.player.coreAreas.putting}/5. 
        ROUND DATA (Hole ${hole.number}): Score: ${currentStats.toPar >= 0 ? '+' + currentStats.toPar : currentStats.toPar}. 
        Stats: ${currentStats.fairwayPct}% Fairways, ${currentStats.gir}% GIR, ${currentStats.ppg} Putts/Hole, ${currentStats.obCount} OBs. 
        MISSES: ${currentTendency}. NEXT 3: ${next3.map(h => `H${h.number}: P${h.par}, ${h.distance}y`).join(', ')}. 
        INSTRUCTION: Act as a gritty caddy. Keep it SHORT (max 3 sentences total before the final thought). 
        CRITICAL INPUTS: Weigh Fairway %, Putts Per Green, and OBs heavily. 
        - If OB > 0: Demand they club down or aim for fat parts of the fairway. 
        - If Putts > 2.0: Demand focus on lag putting pace. 
        - If Fairway % < 50: Demand a conservative tee strategy. 
        Format with emojis for bullet points. You MUST end your response exactly with: "<br><br><strong>Here's one thing to think about for the next three holes:</strong> " followed by ONE short, punchy sentence.`;

        const advice = await getAIAdvice(prompt);
        r.cornerMessages.push({ role: 'coach', text: advice });
        STATE.chatMessages.push({ role: 'coach', text: `Between Holes ${hole.number} & ${hole.number+1}: ${advice}` });
        r.isCoachTyping = false;
        
        setupNextHole(r); saveLocalRoundState(); render();
    } else {
        setupNextHole(r); saveLocalRoundState(); render();
    }
}

function setupNextHole(r) {
    r.holeIndex++;
    const nextHoleDist = STATE.player.courseHoles[r.holeIndex].distance;
    r.currentHoleShots = []; r.penaltyStrokes = 0; 
    r.selectedClubIndex = suggestClubIndex(nextHoleDist);

async function performFinalAnalysis(roundSG) {
    const r = STATE.activeRound;
    const currentPlan = `Learning: ${STATE.player.customPlan.learn.join(' | ') || 'None'}. Practicing: ${STATE.player.customPlan.practice.join(' | ') || 'None'}.`;
    
    const totalStrokes = r.holesLog.reduce((s, h) => s + h.totalStrokes, 0);
    const toPar = r.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0);
    const totalPutts = r.holesLog.reduce((s, h) => s + h.putts, 0);
    
    let allShots = [];
    r.holesLog.forEach(h => h.shots.forEach(s => { if (s.club !== 'Putter') allShots.push(s); }));
    const getPct = (condFn) => allShots.length > 0 ? Math.round((allShots.filter(condFn).length / allShots.length) * 100) : 0;
    
    const shotTendencies = {
        direction: `Left: ${getPct(s => s.direction === 'Left')}%, Straight: ${getPct(s => s.direction === 'Straight')}%, Right: ${getPct(s => s.direction === 'Right')}%`,
        distance: `Short: ${getPct(s => s.distOut === 'Short')}%, Target: ${getPct(s => s.distOut === 'At Dist')}%, Long: ${getPct(s => s.distOut === 'Long')}%`,
        contact: `Miss-hit: ${getPct(s => s.contact === 'Miss-hit')}%, Good: ${getPct(s => s.contact === 'Good Strike')}%, Dreamy: ${getPct(s => s.contact === 'Dreamy')}%`,
        resultingLie: `Rough: ${getPct(s => s.lie === 'Rough')}%, Fairway: ${getPct(s => s.lie === 'Fairway')}%, Green: ${getPct(s => s.lie === 'Green')}%`,
        obPercentage: `${getPct(s => s.ob)}%`
    };

    const roundSummaryJSON = JSON.stringify({
        scoreToPar: toPar > 0 ? `+${toPar}` : toPar, totalPutts: totalPutts, strokesGained: roundSG, shotTendencies: shotTendencies
    });

    const prompt = `PLAYER CONTEXT: 
    - Baseline Abilities (1-5): Driving: ${STATE.player.coreAreas.driving}, Approach: ${STATE.player.coreAreas.approach}, Putting: ${STATE.player.coreAreas.putting}. 
    - Current Active Plan: ${currentPlan}.
    ROUND SUMMARY: ${roundSummaryJSON}.
    INSTRUCTION: 
    1. Analyze the round's Strokes Gained AND shotTendencies data. 
    2. Determine round proficiency (1-5) for core areas (1=Terrible, 5=Excellent). 
    3. Generate 1 to 2 specific NEW things to learn and 1 to 2 NEW things to practice. Base these explicitly on their primary shot tendencies. You MUST include real, clickable HTML links to YouTube searches for the specific drills. 
    4. Provide a single, pithy summarizing thought.
    Return ONLY a valid JSON object using exactly this format:
    { 
      "coreScores": { "driving": 3, "longIrons": 3, "approach": 3, "aroundGreen": 3, "putting": 3, "recovery": 3 },
      "newLearn": ["Specific learning topic with <a href='...'>link</a>"],
      "newPractice": ["Specific drill with <a href='...'>link</a>"],
      "pithyAdvice": "Here's one thing to think about for the next round: [your pithy summary advice]"
    }`;

    try {
        let responseText = await getAIAdvice(prompt, true);
        if (!responseText || responseText === "{}" || responseText === "") throw new Error("Empty AI Response");
        responseText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
        const analysis = JSON.parse(responseText);
        const rawScores = analysis.coreScores || {};
        const getScore = (key1, key2) => Number(rawScores[key1] || rawScores[key2]) || 3;
        
        r.roundProficiency = {
            driving: getScore('driving', 'Driving'), longIrons: getScore('longIrons', 'LongIrons'), approach: getScore('approach', 'Approach'),
            aroundGreen: getScore('aroundGreen', 'AroundGreen'), putting: getScore('putting', 'Putting'), recovery: getScore('recovery', 'Recovery')
        };
        r.newLearn = Array.isArray(analysis.newLearn) ? analysis.newLearn : [];
        r.newPractice = Array.isArray(analysis.newPractice) ? analysis.newPractice : [];
        r.pithyAdvice = analysis.pithyAdvice || "Here's one thing to think about for the next round: Trust your swing and stick to the process.";
        r.aiFailed = false; r.aiErrorMessage = null;
        render();
    } catch(e) {
        console.error("Proficiency Analysis Error Details:", e);
        r.roundProficiency = { driving: 3, longIrons: 3, approach: 3, aroundGreen: 3, putting: 3, recovery: 3 };
        r.newLearn = ["Review course management basics."];
        r.newPractice = ["Hit 20 balls focusing purely on tempo."];
        r.pithyAdvice = "Here's one thing to think about for the next round: Focus on tempo and balance.";
        r.aiFailed = true; r.aiErrorMessage = e.message || String(e);
        render();
    }
}

window.handleGarminUpload = function(event) {
    const file = event.target.files[0];
    if (!file) return;

    STATE.garminLoading = true; STATE.garminError = null; STATE.garminAverages = null;
    STATE.garminSummary = null; STATE.garminLearn = []; STATE.garminPractice = [];
    render();

    const reader = new FileReader();
    reader.onload = async function(e) {
        const text = e.target.result;
        const lines = text.split('\n').filter(l => l.trim() !== '');
        if (lines.length < 2) { STATE.garminError = 'The CSV appears to be empty or malformed.'; STATE.garminLoading = false; render(); return; }

        const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
        const clubIdx = headers.findIndex(h => h.includes('club'));
        let distIdx = headers.findIndex(h => h.includes('total') || h.includes('distance'));
        if (distIdx === -1) distIdx = headers.findIndex(h => h.includes('carry'));
        const smashIdx = headers.findIndex(h => h.includes('smash'));

        if (clubIdx === -1 || distIdx === -1) { STATE.garminError = "Could not find 'Club' and 'Distance' columns in the CSV."; STATE.garminLoading = false; render(); return; }

        let clubData = {};
        let startIdx = 1;
        if (lines.length > 1 && lines[1].includes('[')) startIdx = 2;

        for (let i = startIdx; i < lines.length; i++) {
            const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
            if (cols.length > Math.max(clubIdx, distIdx)) {
                const clubName = cols[clubIdx];
                const dist = parseFloat(cols[distIdx]);
                const smash = smashIdx > -1 ? parseFloat(cols[smashIdx]) : null;

                if (clubName && !isNaN(dist) && dist > 0) {
                    if (!clubData[clubName]) clubData[clubName] = { distSum: 0, count: 0, smashSum: 0, smashCount: 0 };
                    clubData[clubName].distSum += dist; clubData[clubName].count += 1;
                    if (smash && !isNaN(smash)) { clubData[clubName].smashSum += smash; clubData[clubName].smashCount += 1; }
                }
            }
        }

        let averages = [];
        for (let club in clubData) {
            let avgDist = Math.round(clubData[club].distSum / clubData[club].count);
            let avgSmash = clubData[club].smashCount > 0 ? (clubData[club].smashSum / clubData[club].smashCount).toFixed(2) : 'N/A';
            averages.push({ club, avgDist, avgSmash, count: clubData[club].count });
        }
        averages.sort((a, b) => b.avgDist - a.avgDist);

        STATE.garminAverages = averages; STATE.garminLoading = false; STATE.garminAILoading = true;
        render();

        let csvPayload = text;
        if (lines.length > 150) csvPayload = lines.slice(0, 2).join('\n') + '\n' + lines.slice(-148).join('\n');

        const prompt = `System Role: You are an expert golf coach and advanced launch monitor data analyst.
File Structure: Row 1 = metrics. Row 2 = units (e.g., [mph]). Missing data is NaN. 'Measured' spin outweighs 'Estimated'.
Task: 
1. Identify Club and Ball Flight (Path vs Face).
2. Assess Smash Factor & Efficiency.
3. Provide exactly 1-2 learning topics and 1-2 practice drills. Focus exclusively on the most damaging ball-flight tendency. Use HTML links for YouTube searches (e.g. <a href="https://www.youtube.com/results?search_query=smash+factor+drill" class="text-cyan-600 underline" target="_blank">Watch Here</a>).
RAW CSV DATA:
${csvPayload}
Return ONLY valid JSON in this exact format:
{
    "summary": "2-3 sentences summarizing the technical flaws and strengths seen in their launch monitor data.",
    "newLearn": ["Specific learning topic with HTML link"],
    "newPractice": ["Specific practice drill with HTML link"]
}`;

        try {
            let responseText = await getAIAdvice(prompt, true);
            responseText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
            const analysis = JSON.parse(responseText);
            STATE.garminLearn = analysis.newLearn || []; STATE.garminPractice = analysis.newPractice || [];
            STATE.garminSummary = analysis.summary || "Garmin data analyzed successfully.";
        } catch(err) {
            console.error("Garmin AI Error", err);
            STATE.garminSummary = "The data was parsed successfully, but the AI Coach failed to analyze the results.";
            STATE.garminLearn = []; STATE.garminPractice = [];
        }
        STATE.garminAILoading = false; render();
    };
    reader.readAsText(file);
}

window.applyGarminDistances = function() {
    if (!STATE.garminAverages) return;
    let updated = 0;
    STATE.garminAverages.forEach(ga => {
        const gName = ga.club.toLowerCase().replace(/[^a-z0-9]/g, '');
        const bagClub = STATE.player.bag.find(c => {
            const bName = c.name.toLowerCase().replace(/[^a-z0-9]/g, '');
            const bId = c.id.toLowerCase().replace(/[^a-z0-9]/g, '');
            return bName === gName || bId === gName || bName.includes(gName) || gName.includes(bId);
        });
        if (bagClub) { bagClub.distance = ga.avgDist; updated++; }
    });
    if (updated > 0) {
        STATE.player.bag.sort((a, b) => b.distance - a.distance);
        syncProfileToFirebase();
        STATE.garminAverages = null; 
        STATE.garminSummary = `Successfully synced ${updated} updated club distances into your Bag Map!`;
        render();
    }
}

window.handleSwingAnalysis = async function() {
    const dtlFile = document.getElementById('dtl-video').files[0];
    const faceOnFile = document.getElementById('face-on-video').files[0];

    if (!dtlFile || !faceOnFile) { STATE.videoAnalysisError = "Please select both Down-The-Line and Face-On videos."; render(); return; }
    if (dtlFile.size > 15 * 1024 * 1024 || faceOnFile.size > 15 * 1024 * 1024) { STATE.videoAnalysisError = "Videos are too large. Please trim to just the swing."; render(); return; }

    STATE.videoAnalysisStatus = "Preparing videos..."; STATE.videoAnalysisLoading = true; STATE.videoAnalysisError = null; render();

    try {
        const fileToBase64 = (file, label) => {
            return new Promise((resolve, reject) => {
                STATE.videoAnalysisStatus = `Encoding ${label}...`; render();
                const reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = (error) => reject(error);
            });
        };

        const dtlBase64 = await fileToBase64(dtlFile, 'Down-The-Line');
        const faceOnBase64 = await fileToBase64(faceOnFile, 'Face-On');

        STATE.videoAnalysisStatus = "AI Analyzing Biomechanics (15-30s)..."; render();

        const prompt = `Act as a master biomechanical golf instructor. Analyze these two videos of a player's golf swing. 
        Video 1 (File 1) is Down-The-Line. Video 2 (File 2) is Face-On. 
        Identify the single biggest mechanical 'power leak' or 'accuracy killer'. 
        Provide exactly 1-2 learning pieces and 1-2 drills. You MUST include HTML links for YouTube searches (e.g., <a href="https://www.youtube.com/results?search_query=golf+tempo+drill" target="_blank" class="text-cyan-600 underline">Watch on YouTube</a>). 
        Return ONLY valid JSON: { "summary": "...", "newLearn": ["..."], "newPractice": ["..."] }`;

        const model = getGenerativeModel(vertexAI, { 
            model: "gemini-2.5-flash",
            systemInstruction: "You are a professional golf data analyst. Return ONLY valid JSON. Strictly adhere to the requested schema. No prose.",
            generationConfig: { responseMimeType: "application/json" }
        });

        const result = await model.generateContent([
            { inlineData: { data: dtlBase64, mimeType: dtlFile.type || "video/mp4" } },
            { inlineData: { data: faceOnBase64, mimeType: faceOnFile.type || "video/mp4" } },
            { text: prompt }
        ]);

        let responseText = result.response.text();
        responseText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
        const analysis = JSON.parse(responseText);

        STATE.videoSummary = analysis.summary;
        STATE.videoLearn = analysis.newLearn || [];
        STATE.videoPractice = analysis.newPractice || [];
        STATE.videoAnalysisLoading = false; render();

    } catch (err) {
        console.error("Video Analysis Error:", err);
        STATE.videoAnalysisError = "Failed to analyze videos: " + (err.message || "Network error");
        STATE.videoAnalysisLoading = false; render();
    }
}

initFirebase().then(() => {
    const localStr = localStorage.getItem('descent_local_player');
    if (localStr) {
        try {
            const localData = JSON.parse(localStr);
            if (localData && localData.phone) {
                STATE.player = localData;
                
                const activeRoundStr = localStorage.getItem('descent_active_round');
                if (activeRoundStr) STATE.activeRound = JSON.parse(activeRoundStr);
                
                switchView('learn');
                
                if (navigator.onLine && db) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'descent-app-id';
                    getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', localData.phone))
                        .then(snap => {
                            if (snap.exists()) {
                                STATE.player = { ...STATE.player, ...snap.data() };
                                localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
                                render();
                            }
                        }).catch(e => console.warn("Background profile sync failed", e));
                }
                return;
            }
        } catch(e) { console.warn("Failed to parse local profile:", e); }
    }
    switchView('welcome');
});
