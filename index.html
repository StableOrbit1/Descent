window.syncProfileToFirebase = async function() {
    if (!db || !STATE.player.phone) return;
    try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', STATE.player.phone);
        await setDoc(docRef, STATE.player, { merge: true });
    } catch (e) {
        console.error("Failed to sync profile:", e);
    }
}

async function saveRoundToFirebase(roundData) {
    if (!db || !STATE.player.phone) return;
    try {
        const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
        await addDoc(roundsCol, {
            ...roundData,
            timestamp: new Date().toISOString()
        });
        
        STATE.player.hasPlayedRound = true;
        STATE.player.roundCount++;
        
        // Generate Achievements
        window.checkAchievements(roundData);
        
        await syncProfileToFirebase();
    } catch (e) {
        console.error("Failed to save round:", e);
    }
}

// SECURE Vertex AI / Gemini integration with heavy error output
async function getAIAdvice(promptText, requiresJson = false) {
    if (!vertexAI) {
        console.error("Vertex AI SDK failed to initialize.");
        return requiresJson ? "{}" : "Coach is offline. Vertex SDK not initialized.";
    }

    const instruction = requiresJson 
        ? "You are a golf data analyst. Return ONLY raw, valid JSON. Do not use markdown wrappers like ```json."
        : "You are a gritty, encouraging golf coach (think boxing coach in the corner between rounds). Keep it to 2-3 short, punchy sentences. Offer real strategic advice based on the data provided, and give a strong pep talk.";

    try {
        // Initialize the Gemini 2.5 Flash model via Firebase Vertex AI
        const model = getGenerativeModel(vertexAI, { 
            model: "gemini-2.5-flash",
            systemInstruction: instruction
        });
        
        const result = await model.generateContent(promptText);
        return result.response.text();
        
    } catch (err) {
        console.error("==== VERTEX AI CRASH ====");
        console.error("Error Message:", err.message);
        console.error("Error Name/Code:", err.name, err.code);
        console.error("Full Error Object:", err);
        console.error("=========================");
        
        // Instead of silencing the error, return the EXACT error message to the UI
        return requiresJson ? "{}" : `AI ERROR: ${err.message}. (Open browser console for more details)`;
    }
}

function getWeeksRemaining() {
    const target = new Date(STATE.player.targetDate);
    const now = new Date();
    const diffTime = target - now;
    if (diffTime <= 0) return 1;
    return Math.max(1, Math.ceil((diffTime / (1000 * 60 * 60 * 24)) / 7));
}

const root = document.getElementById('app-root');
const nav = document.getElementById('bottom-nav');

window.switchView = function(viewName) {
    STATE.currentView = viewName;
    render();
    
    const hiddenViews = ['welcome', 'onboarding', 'welcome_sequence', 'play_active', 'post_round', 'coach_corner'];
    if (hiddenViews.includes(viewName)) {
        nav.classList.add('hidden');
    } else {
        nav.classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if(btn.dataset.tab === viewName) {
                btn.classList.remove('text-[#404060]');
                btn.classList.add('text-[#2DCB8A]');
            } else {
                btn.classList.add('text-[#404060]');
                btn.classList.remove('text-[#2DCB8A]');
            }
        });
    }

    if (viewName === 'coach' || viewName === 'coach_corner') {
        setTimeout(() => {
            const chatBox = document.getElementById('chat-scroll-area');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }, 50);
    }
}

function render() {
    let html = '';
    switch(STATE.currentView) {
        case 'welcome': html = renderWelcome(); break;
        case 'onboarding': html = renderOnboarding(); break;
        case 'welcome_sequence': html = renderWelcomeSequence(); break;
        case 'learn': html = renderLearn(); break;
        case 'practice': html = renderPractice(); break;
        case 'checkin': html = renderCheckIn(); break;
        case 'play': html = renderPlayIntro(); break;
        case 'play_active': html = renderPlayActive(); break;
        case 'coach_corner': html = renderCoachCorner(); break;
        case 'post_round': html = renderPostRound(); break;
        case 'progress': html = renderProgress(); break;
        case 'coach': html = renderCoach(); break;
    }
    root.innerHTML = html;
}

function renderPostRound() {
    const round = STATE.activeRound;
    if (!round) return '';

    const totalStrokes = round.holesLog.reduce((sum, h) => sum + h.totalStrokes, 0);
    const totalPar = STATE.player.courseHoles.reduce((sum, h) => sum + h.par, 0);
    const scoreToPar = totalStrokes - totalPar;
    const scoreString = scoreToPar > 0 ? `+${scoreToPar}` : scoreToPar === 0 ? 'E' : scoreToPar;

    const parStats = { 3: { s: 0, c: 0 }, 4: { s: 0, c: 0 }, 5: { s: 0, c: 0 } };
    round.holesLog.forEach(h => { if(parStats[h.par]) { parStats[h.par].s += h.totalStrokes; parStats[h.par].c++; } });

    let bestStretchScore = Infinity; let bestStartHole = 1;
    for (let i = 0; i <= round.holesLog.length - 3; i++) {
        const sum = (round.holesLog[i].totalStrokes - round.holesLog[i].par) + 
                    (round.holesLog[i+1].totalStrokes - round.holesLog[i+1].par) + 
                    (round.holesLog[i+2].totalStrokes - round.holesLog[i+2].par);
        if (sum < bestStretchScore) { bestStretchScore = sum; bestStartHole = round.holesLog[i].number; }
    }
    const stretchStr = bestStretchScore > 0 ? `+${bestStretchScore}` : bestStretchScore === 0 ? 'E' : bestStretchScore;

    let scorecardHTML = `<div class="grid grid-cols-10 gap-1 text-[10px] text-center font-bold text-[#8890A0] mb-2"><div class="col-span-1">H</div><div class="col-span-1">P</div><div class="col-span-1">S</div><div class="col-span-1">H</div><div class="col-span-1">P</div><div class="col-span-1">S</div><div class="col-span-1">H</div><div class="col-span-1">P</div><div class="col-span-1">S</div></div>`;
    for(let i=0; i<6; i++) {
        scorecardHTML += `<div class="grid grid-cols-10 gap-1 text-xs text-center mb-1 text-white">`;
        for(let j=0; j<3; j++) {
            const h = round.holesLog[i*3 + j];
            if(!h) continue;
            const color = h.totalStrokes < h.par ? 'text-[#2DCB8A]' : h.totalStrokes > h.par ? 'text-[#E85030]' : 'text-white';
            scorecardHTML += `<div class="col-span-1 py-1 bg-[#1A1A3A] rounded">${h.number}</div><div class="col-span-1 py-1 bg-[#1A1A3A] rounded">${h.par}</div><div class="col-span-1 py-1 bg-[#1A1A3A] rounded font-bold ${color}">${h.totalStrokes}</div>${j<2?'<div class="col-span-0.5"></div>':''}`;
        }
        scorecardHTML += `</div>`;
    }

    let aiSectionHTML = '';
    if (round.analysis === 'loading') {
        aiSectionHTML = `
        <div class="bg-[#1D7A5A]/20 p-6 rounded-2xl border border-[#2DCB8A]/30 text-center animate-pulse">
            <div class="text-3xl mb-4">🤖</div>
            <h3 class="font-bold text-[#2DCB8A] mb-2">Coach is analyzing your round...</h3>
            <p class="text-sm text-[#8890A0]">Running Strokes Gained, updating core metrics, and building your weekly plan.</p>
        </div>`;
    } else if (round.analysis) {
        aiSectionHTML = `
        <div class="bg-[#1A1A3A] p-6 rounded-2xl border border-[#2DCB8A]/50 shadow-xl mb-6">
            <h3 class="font-serif text-xl font-bold text-[#F4F4F0] mb-3 flex items-center gap-2">🤖 Coach Analysis</h3>
            <p class="text-[#F4F4F0] text-sm leading-relaxed mb-6 italic border-l-2 border-[#2DCB8A] pl-3">"${round.analysis.coachMessage}"</p>
            
            <div class="mb-6">
                <h4 class="text-xs font-bold uppercase tracking-widest text-[#8890A0] mb-3">Updated Core Proficiency</h4>
                <div class="grid grid-cols-2 gap-2">
                    ${Object.keys(round.analysis.coreScores).map(k => `
                        <div class="flex justify-between items-center text-sm border-b border-white/5 pb-1">
                            <span class="capitalize text-[#8890A0]">${k.replace(/([A-Z])/g, ' $1').trim()}</span>
                            <span class="text-[#2DCB8A] font-bold">${round.analysis.coreScores[k]}/5</span>
                        </div>
                    `).join('')}
                </div>

            <div class="space-y-4 mb-6">
                <div>
                    <h4 class="text-xs font-bold uppercase tracking-widest text-[#8890A0] mb-1">Recommended Reading</h4>
                    <p class="text-sm text-[#F4F4F0]">${round.analysis.suggestedLearn}</p>
                </div>
                <div>
                    <h4 class="text-xs font-bold uppercase tracking-widest text-[#8890A0] mb-1">Recommended Drill</h4>
                    <p class="text-sm text-[#F4F4F0]">${round.analysis.suggestedPractice}</p>

            <button onclick="acceptAIPlan()" class="w-full bg-[#2DCB8A] hover:bg-[#34e09a] text-[#0D1A12] font-bold py-3 rounded-xl transition-transform active:scale-95">

// === PLAY TAB OVERHAUL ===

window.suggestClubIndex = function(distance) {
    const bag = STATE.player.bag;
    if (distance <= 30) {
        const idx = bag.findIndex(c => c.id === 'putter');
        return idx >= 0 ? idx : 0;
    }
    
    let closestIdx = -1;
    let smallestDiff = Infinity;
    for (let i = 0; i < bag.length; i++) {
        if (bag[i].id === 'putter') continue;
        const diff = bag[i].distance - distance;
        if (diff >= 0 && diff < smallestDiff) {
            smallestDiff = diff;
            closestIdx = i;
        }
    }
    
    if (closestIdx === -1) {
        let maxDist = -1;
        for (let i = 0; i < bag.length; i++) {
            if (bag[i].id === 'putter') continue;
            if (bag[i].distance > maxDist) { maxDist = bag[i].distance; closestIdx = i; }
        }
    }
    return closestIdx === -1 ? 0 : closestIdx;
}

window.recordFairwayShot = function() {
    const round = STATE.activeRound;
    const club = STATE.player.bag[round.selectedClubIndex];
    const outs = round.shotOutcomes;
    const dist = parseInt(document.getElementById('shot-distance').value) || 0;
    
    round.currentHoleShots.push({ 
        club: club.name, distance: dist, type: document.getElementById('shot-type').value,
        outDistance: outs.dist, outDirection: outs.dir, outLie: outs.lie, outContact: outs.cont, outOB: outs.ob
    });

    if (outs.ob) round.penaltyStrokes += 1;

    if (outs.lie === 'Green') {
        round.holeState = 'green';
    } else {
        const remaining = Math.max(0, dist - club.distance);
        round.currentShotDistance = remaining;
        round.selectedClubIndex = suggestClubIndex(remaining);
        round.shotOutcomes = { dist: 'At Dist', dir: 'Straight', lie: 'Fairway', cont: 'Good Strike', ob: false };
    }
    render();
}

window.saveHoleData = async function() {
    const round = STATE.activeRound;
    const hole = STATE.player.courseHoles[round.holeIndex];
    const putts = parseInt(document.getElementById('putt-count').value) || 0;
    const comment = document.getElementById('hole-comment').value.trim();

    round.holesLog.push({
        number: hole.number, par: hole.par,
        shots: [...round.currentHoleShots], putts: putts, penalties: round.penaltyStrokes,
        totalStrokes: round.currentHoleShots.length + putts + round.penaltyStrokes, 
        comment: comment
    });

    if (hole.number === 18) {
        await finishRoundLogic();
    } else if (hole.number % 3 === 0 && !STATE.player.settings.silenceCoach) {
        round.holeState = 'fairway'; round.holeIndex++; round.currentHoleShots = []; round.penaltyStrokes = 0;
        
        const last3 = round.holesLog.slice(-3);
        const promptData = last3.map(h => `Hole ${h.number}(Par ${h.par}): ${h.totalStrokes} strokes (${h.putts} putts, ${h.penalties} penalties). Shots: ${h.shots.map(s => `${s.club} (${s.outContact}${s.outOB ? ' [OB]' : ''}, ${s.outLie})`).join(', ')}. Comment: ${h.comment || 'none'}`).join('. ');
        
        round.cornerMessages = []; round.isCoachTyping = true;
        switchView('coach_corner');
        const advice = await getAIAdvice(`Here is my data for the last 3 holes: ${promptData}. Analyze the shot outcomes and give me strategy for the next 3 holes.`);
        round.cornerMessages.push({ role: 'coach', text: advice }); round.isCoachTyping = false;
        STATE.chatMessages.push({ role: 'coach', text: `Between Holes ${hole.number} & ${hole.number+1}: ${advice}` });
        render();
    } else {
        round.holeIndex++; round.currentHoleShots = []; round.penaltyStrokes = 0;
        const nextHole = STATE.player.courseHoles[round.holeIndex];
        round.currentShotDistance = nextHole.distance;
        round.selectedClubIndex = suggestClubIndex(nextHole.distance);
        round.shotOutcomes = { dist: 'At Dist', dir: 'Straight', lie: 'Fairway', cont: 'Good Strike', ob: false };
        round.holeState = 'fairway'; render();
    }
}

async function finishRoundLogic() {
    const round = STATE.activeRound;
    
    // Calc Club Avgs
    const sums = {}; const counts = {};
    round.holesLog.forEach(h => h.shots.forEach(s => {
        if(s.distance > 0 && s.type === 'Full') {
            if(!sums[s.club]) { sums[s.club] = 0; counts[s.club] = 0; }
            sums[s.club] += s.distance; counts[s.club]++;
        }
    }));
    Object.keys(sums).forEach(k => { round.clubAvgs[k] = Math.round(sums[k]/counts[k]); });

    round.analysis = 'loading';
    switchView('post_round');

    const promptData = JSON.stringify(round.holesLog.map(h => ({
        hole: h.number, par: h.par, score: h.totalStrokes, putts: h.putts, comment: h.comment,
        shots: h.shots.map(s => `${s.club} (${s.type}): ${s.outDistance}, ${s.outDirection}, ${s.outLie}, ${s.outContact}${s.outOB ? ' (OB)' : ''}`)
    })));

    const prompt = `Analyze this golf round data: ${promptData}. 
    Return ONLY a valid JSON object with EXACTLY this structure (no markdown wrappers):
    {
      "coreScores": {"driving": 3, "longIrons": 3, "approach": 3, "aroundGreen": 3, "putting": 3, "recovery": 3},
      "coachMessage": "positive 2 sentence constructive pep talk",
      "suggestedLearn": "1 sentence reading rec based on weakness",
      "suggestedPractice": "1 drill rec based on weakness",
      "clubInsights": {"Driver": "Tends to miss right.", "7 Iron": "Consistently coming up short."}
    }`;
    
    const textRes = await getAIAdvice(prompt, true);
    try {
        const start = textRes.indexOf('{');
        const end = textRes.lastIndexOf('}') + 1;
        if(start >= 0 && end > start) {
            round.analysis = JSON.parse(textRes.substring(start, end));
        } else { throw new Error('Bad format'); }
    } catch(e) {
        console.error("AI parse error", e, textRes);
        round.analysis = {
            coreScores: { driving: 3, longIrons: 3, approach: 3, aroundGreen: 3, putting: 2, recovery: 3 },
            coachMessage: "Way to battle out there! We left a few out there on the greens, but the foundation is solid.",
            suggestedLearn: "Review the 'Clock System' for wedge distance control.",
            suggestedPractice: "Lag Putting: Hit 10 putts from 40 feet to within a 3-foot circle.",
            clubInsights: { "Putter": "Speed control needs work." }
        };
    }
    
    await saveRoundToFirebase({ course: STATE.player.courseName, holes: round.holesLog });
    render();
}

window.checkAchievements = function(roundData) {
    const a = STATE.player.achievements;
    const addBadge = (title, icon) => { if (!a.some(x => x.title === title)) a.push({title, icon}); }
    
    if (STATE.player.roundCount === 1) addBadge("First Round Logged", "🏆");
    
    const totalScore = roundData.holes.reduce((sum, h) => sum + h.totalStrokes, 0);
    if (totalScore < 100) addBadge("Broke 100", "💯");
    if (totalScore < 90) addBadge("Broke 90", "🔥");
    if (totalScore < 80) addBadge("Broke 80", "🦅");
    
    const hasBirdie = roundData.holes.some(h => h.totalStrokes < h.par);
    if (hasBirdie) addBadge("Birdie Hunter", "🎯");
}

window.sendCornerMessage = async function() {
    const inputEl = document.getElementById('corner-chat-input');
    const text = inputEl.value.trim();
    if (!text) return;

    STATE.activeRound.cornerMessages.push({ role: 'user', text: text });
    STATE.chatMessages.push({ role: 'user', text: text });
    inputEl.value = '';
    STATE.activeRound.isCoachTyping = true;
    render();

    const advice = await getAIAdvice(`The player replied to your last advice with: "${text}". Give a 1-2 sentence response.`);
    STATE.activeRound.cornerMessages.push({ role: 'coach', text: advice });
    STATE.chatMessages.push({ role: 'coach', text: advice });
    STATE.activeRound.isCoachTyping = false;
    render();
}

window.returnToTee = function() {
    const nextHole = STATE.player.courseHoles[STATE.activeRound.holeIndex];
    STATE.activeRound.currentShotDistance = nextHole.distance;
    STATE.activeRound.selectedClubIndex = suggestClubIndex(nextHole.distance);
    switchView('play_active');
}

window.setCoachMode = function(mode) { STATE.coachMode = mode; render(); }
window.sendChatMessage = async function() {
    const text = STATE.chatInput;
    if (!text || !text.trim()) return;
    STATE.chatMessages.push({ role: 'user', text: text.trim() });
    STATE.chatInput = ''; STATE.isTyping = true; render();
    
    const advice = await getAIAdvice(`The player asks: "${text}". Give a 1-2 sentence coaching response.`);
    STATE.chatMessages.push({ role: 'coach', text: advice });
    STATE.isTyping = false; render();
}

initFirebase().then(async () => {
    const savedPhone = localStorage.getItem('descent_phone');
    if (savedPhone && db) {
        try {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', savedPhone);
            const docSnap = await getDoc(docRef);
            if(docSnap.exists()) {
                STATE.player = { ...STATE.player, ...docSnap.data() };
                
                if(!STATE.player.achievements) STATE.player.achievements = [];
                if(!STATE.player.completedTasksSet) STATE.player.completedTasksSet = {};
                if(!STATE.player.customPlan) STATE.player.customPlan = { learn: [], practice: [] };
                if(!STATE.player.settings) STATE.player.settings = { silenceCoach: false };
                if(!STATE.player.clubInsights) STATE.player.clubInsights = {};
                
                switchView('learn');
                return;
            }
        } catch(e) {}
    }
    switchView('welcome');
});

document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchView(btn.dataset.tab));
});

</script>
</body>
