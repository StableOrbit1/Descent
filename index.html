window.addEventListener('online', () => {

window.syncProfileToFirebase = async function() {
    // 1. Always update local cache instantly for offline resilience
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));

    if (!navigator.onLine || !db || !STATE.player.phone) {
        localStorage.setItem('descent_pending_profile_sync', 'true');
        return;
    }

    try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', STATE.player.phone);
        await setDoc(docRef, STATE.player, { merge: true });
        localStorage.removeItem('descent_pending_profile_sync');
    } catch (e) {
        console.error("Failed to sync profile. Queueing for later:", e);
        localStorage.setItem('descent_pending_profile_sync', 'true');
    }
}

function savePendingRound(roundPayload) {
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    pending.push(roundPayload);
    localStorage.setItem('descent_pending_rounds', JSON.stringify(pending));
}

window.syncPendingRounds = async function() {
    if (!navigator.onLine || !db || !STATE.player.phone) return;
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    if (pending.length === 0) return;

    let remaining = [];
    for (let roundPayload of pending) {
        try {
            const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
            // Push to DB and mark syncedAt
            await addDoc(roundsCol, { ...roundPayload, syncedAt: new Date().toISOString() });
        } catch (e) {
            console.error("Failed to sync queued round. Keeping in queue:", e);
            remaining.push(roundPayload);
        }
    }
    localStorage.setItem('descent_pending_rounds', JSON.stringify(remaining));
}

async function saveRoundToFirebase(roundData) {
    // Optimistic state updates before any network calls
    STATE.player.hasPlayedRound = true;
    STATE.player.roundCount++;
    window.checkAchievements(roundData);
    
    // Always cache locally instantly
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
    
    const roundPayload = { ...roundData, timestamp: new Date().toISOString() };

    // If offline, queue the round and bail gracefully
    if (!navigator.onLine || !db || !STATE.player.phone) {
        console.warn("Offline or DB unavailable. Queueing round locally.");
        savePendingRound(roundPayload);
        return;
    }

    try {
        const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
        await addDoc(roundsCol, roundPayload);
        await syncProfileToFirebase();
    } catch (e) {
        console.error("Failed to save round to Firebase, queueing locally:", e);
        savePendingRound(roundPayload);
    }
}

async function getAIAdvice(promptText, requiresJson = false) {
    if (!navigator.onLine) {
        if (requiresJson) throw new Error("Network offline.");
        return "Coach is offline. Trust your swing and stick to your pre-shot routine.";
    }
    if (!vertexAI) {
        if (requiresJson) throw new Error("Vertex AI not initialized. Check Firebase config.");
        return "Coach is offline (Vertex AI not initialized).";
    }
    
    const instruction = requiresJson 
        ? "You are a professional golf data analyst. Return ONLY raw, valid JSON. Do not include markdown formatting or backticks."
        : "You are a professional golf 'Corner Man'. Give SALIENT, CRISP coaching advice.";

    // Use gemini-2.5-flash since 1.5 is officially retired in Vertex AI
    const modelConfig = { 
        model: "gemini-2.5-flash",
        systemInstruction: instruction
    };
    
    if (requiresJson) {
        modelConfig.generationConfig = { responseMimeType: "application/json" };
    }

    try {
        const model = getGenerativeModel(vertexAI, modelConfig);
        
        // Implement exponential backoff for cold starts and API rate limits
        const generate = async (retries = 3, delay = 1000) => {
            try {
                const result = await model.generateContent(promptText);
                const text = result.response.text();
                if (!text) throw new Error("Empty response from AI");
                return text;
                
            } catch (error) {
                console.warn(`AI Retry Attempt Failed (${3 - retries}/3):`, error.message);
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, delay));
                    return generate(retries - 1, delay * 2);
                }
                throw error; // Throw the actual error up after retries exhausted
            }
        };

        return await generate();
    } catch (err) {
        console.error("Detailed AI Error:", err);
        if (requiresJson) throw err; // Pass real error to performFinalAnalysis
        return `AI Error: ${err.message || String(err)}.`; // Surface in chat UI
    }
}

window.calculateRoundSG = function(holes) {
    let sg = { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    
    holes.forEach(h => {
        let strokes_lost = h.par - h.totalStrokes;
        
        // 1. Putting SG (Assumes 2.0 putts per hole is baseline par for scratch)
        let putting_sg = 2.0 - h.putts;
        
        // 2. Off Tee SG
        let offTee_sg = 0;
        if (h.par > 3 && h.shots.length > 0) {
            let teeShot = h.shots[0];
            if (teeShot.ob) offTee_sg = -2.0;
            else if (teeShot.lie !== 'Fairway') offTee_sg = -0.5;
        }
        
        // 3. Short Game SG
        let shortGame_sg = 0;
        let shortShots = h.shots.filter(s => s.distance <= 50 && s.club !== 'Putter');
        if (shortShots.length > 1) {
            // Penalize taking multiple shots inside 50y to get on the green
            shortGame_sg = -(shortShots.length - 1);
        }
        shortShots.forEach(s => { if(s.ob) shortGame_sg -= 1.0; });
        
        // 4. Approach SG (Catch-all for remaining strokes lost)
        let approach_sg = strokes_lost - (putting_sg + offTee_sg + shortGame_sg);

        sg.putting += putting_sg;
        sg.offTee += offTee_sg;
        sg.shortGame += shortGame_sg;
        sg.approach += approach_sg;
    });
    
    // Normalize SG to an 18 hole equivalent (if playing partial rounds)
    let scale = 18 / Math.max(1, holes.length);
    return {
        putting: sg.putting * scale,
        offTee: sg.offTee * scale,
        shortGame: sg.shortGame * scale,
        approach: sg.approach * scale
    };
}

window.switchView = function(viewName) {
    STATE.currentView = viewName;
    render();
    const hiddenViews = ['welcome', 'onboarding', 'welcome_sequence', 'play_active', 'post_round', 'coach_corner'];
    if (hiddenViews.includes(viewName)) nav.classList.add('hidden');
    else {
        nav.classList.remove('hidden');
        document.querySelectorAll('.nav-btn').forEach(btn => {
            if(btn.dataset.tab === viewName) {
                btn.classList.remove('text-[#404060]'); btn.classList.add('text-[#2DCB8A]');
            } else {
                btn.classList.add('text-[#404060]'); btn.classList.remove('text-[#2DCB8A]');
            }
        });
    }
    
    if (viewName === 'coach' || viewName === 'coach_corner') {
        setTimeout(() => {
            const chatBox = document.getElementById(viewName === 'coach' ? 'chat-scroll-area' : 'corner-chat-area');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }, 50);
    }
}

function render() {
    let html = '';
    switch(STATE.currentView) {
        case 'welcome': html = renderWelcome(); break;
        case 'onboarding': html = renderOnboarding(); break;
        case 'welcome_sequence': html = renderWelcomeSequence(); break;
        case 'learn': html = renderLearn(); break;
        case 'practice': html = renderPractice(); break;
        case 'checkin': html = renderCheckIn(); break;
        case 'play': html = renderPlayIntro(); break;
        case 'play_active': html = renderPlayActive(); break;
        case 'coach_corner': html = renderCoachCorner(); break;
        case 'post_round': html = renderPostRound(); break;
        case 'progress': html = renderProgress(); break;
        case 'coach': html = renderCoach(); break;
    }
    root.innerHTML = html;
}

function renderPlayActive() {

    const hole = STATE.player.courseHoles[round.holeIndex];

    const outs = round.shotOutcomes;

    const completedHoles = round.holesLog.length;
    const currentTotalStrokes = round.holesLog.reduce((s, h) => s + h.totalStrokes, 0) + round.currentHoleShots.length + round.penaltyStrokes + (round.tempPuttCount || 0);
    const scoreToPar = round.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0);
    const scoreToParStr = scoreToPar > 0 ? `+${scoreToPar}` : scoreToPar === 0 ? 'E' : scoreToPar;

    const ppg = completedHoles > 0 ? (totalPutts / completedHoles).toFixed(1) : '0.0';

                    <button onclick="setOutcome('lie', 'Fairway')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.lie==='Fairway'?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">Fairway</button>
                    <button onclick="setOutcome('lie', 'Green')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.lie==='Green'?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">Green</button>
                </div>
                <div class="flex gap-2">
                    <button onclick="setOutcome('cont', 'Miss-hit')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Miss-hit'?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">Miss-hit</button>
                    <button onclick="setOutcome('cont', 'Good Strike')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Good Strike'?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">Good Strike</button>
                    <button onclick="setOutcome('cont', 'Dreamy')" class="flex-1 py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.cont==='Dreamy'?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">Dreamy</button>
                </div>
                <button onclick="setOutcome('ob', ${!outs.ob})" class="w-full py-2 text-[10px] uppercase font-bold rounded-lg border ${outs.ob?'bg-[#E85030] text-white border-[#E85030]':'bg-[#1A1A3A] text-[#8890A0] border-transparent'}">${outs.ob ? 'OB (Penalty Added)' : 'Mark as OB'}</button>
            </div>

            <button onclick="recordFairwayShot()" class="w-full bg-[#2DCB8A] text-[#0D1A12] font-bold py-3 rounded-xl transition-transform active:scale-95 shadow-lg mt-auto uppercase tracking-widest">Record Shot</button>
        `;
    } else {
        interactions = `
            <div class="text-center mb-4 mt-2">
                <div class="text-[#2DCB8A] text-xs font-bold uppercase tracking-widest mb-4">On the Green</div>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button onclick="finishHoleWithPutts(0)" class="col-span-2 py-4 text-sm font-bold uppercase tracking-widest rounded-2xl border-2 ${round.tempPuttCount===0?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#F4F4F0] border-white/5'}">Hole Out (0 Putts)</button>
                    <button onclick="finishHoleWithPutts(1)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===1?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#F4F4F0] border-white/5'}">1</button>
                    <button onclick="finishHoleWithPutts(2)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===2?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#F4F4F0] border-white/5'}">2</button>
                    <button onclick="finishHoleWithPutts(3)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===3?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#F4F4F0] border-white/5'}">3</button>
                    <button onclick="finishHoleWithPutts(4)" class="py-3 text-xl font-bold rounded-2xl border-2 ${round.tempPuttCount===4?'bg-[#2DCB8A] text-[#0D1A12] border-[#2DCB8A]':'bg-[#1A1A3A] text-[#F4F4F0] border-white/5'}">4+</button>
                </div>
                <textarea id="hole-comment" placeholder="Any notes on this hole?" class="w-full bg-[#1A1A3A] border border-white/10 rounded-xl p-3 text-sm text-[#F4F4F0] outline-none h-20 resize-none mb-2"></textarea>
            </div>
        `;
    }

    return `
    <div class="flex flex-col h-full bg-[#0D0D1E]">
        <div class="bg-[#1A1A3A] p-4 rounded-b-2xl border-b border-white/10 shadow-lg shrink-0">
            <div class="flex justify-between items-center mb-4">
                <div><span class="text-[#2DCB8A] font-bold uppercase tracking-widest text-[10px]">Hole ${hole.number}</span><h2 class="text-2xl font-serif font-bold">Par ${hole.par}</h2></div>
                <div class="text-right"><span class="text-[#8890A0] font-bold uppercase tracking-widest text-[10px]">Total Strokes</span><div class="text-3xl font-serif font-bold text-[#E8A930]">${currentTotalStrokes}</div></div>
            </div>
            <div class="grid grid-cols-4 gap-2 text-center border-t border-white/5 pt-3">
                <div><div class="text-[9px] uppercase font-bold text-[#404060] mb-1">To Par</div><div class="text-sm font-black ${scoreToPar > 0 ? 'text-[#E85030]' : 'text-[#2DCB8A]'}">${scoreToParStr}</div></div>
                <div><div class="text-[9px] uppercase font-bold text-[#404060] mb-1">PPG</div><div class="text-sm font-black text-white">${ppg}</div></div>
                <div><div class="text-[9px] uppercase font-bold text-[#404060] mb-1">GIR %</div><div class="text-sm font-black text-[#2DCB8A]">${girPct}%</div></div>
                <div><div class="text-[9px] uppercase font-bold text-[#404060] mb-1">Holes</div><div class="text-sm font-black text-white">${completedHoles}</div></div>
            </div>
        </div>
        <div class="p-4 flex-1 flex flex-col hide-scrollbar overflow-y-auto pb-4">${interactions}</div>
    </div>`;
}

function renderCoachCorner() {
    const round = STATE.activeRound;
    return `
    <div class="flex flex-col h-full p-6 animate-fade-in bg-[#0D0D1E]">
        <div class="text-center mt-6 mb-8">
            <div class="w-16 h-16 rounded-full bg-[#1D7A5A] flex items-center justify-center text-3xl mx-auto mb-4 border-2 border-[#2DCB8A] shadow-[0_0_20px_rgba(45,203,138,0.2)]">🥊</div>
            <h1 class="text-3xl font-serif font-bold uppercase tracking-tighter text-[#F4F4F0]">Corner Man</h1>
            <p class="text-[#8890A0] text-sm mt-1 uppercase tracking-widest font-bold">Mid-Round Strategy</p>
        </div>
        <div class="flex-1 bg-[#1A1A3A] border border-white/10 rounded-2xl p-6 overflow-y-auto hide-scrollbar mb-8">

                <div class="flex gap-2 items-center text-[#8890A0]">
                    <div class="w-2 h-2 bg-[#2DCB8A] rounded-full animate-bounce"></div>

                <button onclick="sendCornerMessage()" class="w-12 rounded-xl bg-[#1A1A3A] border border-white/10 hover:border-[#2DCB8A] flex items-center justify-center text-[#2DCB8A] transition-colors"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
            </div>
            <button onclick="returnToTee()" class="w-full bg-[#2DCB8A] text-[#0D1A12] font-bold py-5 rounded-xl uppercase tracking-widest shadow-lg active:scale-95 transition-transform">Back to the Tee &rarr;</button>
        </div>
    </div>`;
}

function renderPostRound() {
    const r = STATE.activeRound;
    const holes = r.holesLog;
    const totalStrokes = holes.reduce((s, h) => s + h.totalStrokes, 0);
    const totalPar = holes.reduce((s, h) => s + h.par, 0);
    const toPar = totalStrokes - totalPar;
    const toParStr = toPar > 0 ? `+${toPar}` : toPar === 0 ? 'E' : toPar;

    const drivableHoles = holes.filter(h => h.par > 3);
    const fairwaysHit = drivableHoles.filter(h => h.shots[0]?.lie === 'Fairway').length;
    const fairwayPct = drivableHoles.length > 0 ? Math.round((fairwaysHit / drivableHoles.length) * 100) : 0;
    
    const totalPutts = holes.reduce((s, h) => s + h.putts, 0);
    const ppg = (totalPutts / holes.length).toFixed(1);

    const parStats = { 3: { s: 0, c: 0 }, 4: { s: 0, c: 0 }, 5: { s: 0, c: 0 } };
    holes.forEach(h => { parStats[h.par].s += h.totalStrokes; parStats[h.par].c++; });

    const filteredClub = r.summaryFilter || 'All';
    let allShots = [];
    holes.forEach(h => h.shots.forEach(s => allShots.push(s)));
    if (filteredClub !== 'All') allShots = allShots.filter(s => s.club === filteredClub);

    const getDistPct = (dir, dist) => {
        if (allShots.length === 0) return '0%';
        const count = allShots.filter(s => s.direction === dir && s.distOut === dist).length;
        return Math.round((count / allShots.length) * 100) + '%';
    };

    const clubsInBag = [...new Set(STATE.player.bag.map(c => c.name))];
    const isPutter = filteredClub === 'Putter';

    let suggestionsHTML = '';
    if (r.newLearn?.length > 0 || r.newPractice?.length > 0) {
        suggestionsHTML = `
            <div class="mb-10 animate-fade-in">
                <h3 class="text-xs font-black uppercase tracking-widest text-[#8890A0] mb-4">Coach Plan Updates</h3>
                <div class="space-y-3">
                    ${r.newLearn.map((item, idx) => `
                        <div class="bg-[#1A1A3A] p-4 rounded-xl border border-[#2DCB8A]/30 shadow-lg">
                            <span class="text-[10px] uppercase font-black text-[#2DCB8A] mb-2 block tracking-widest">New to Learn</span>
                            <p class="text-sm text-white mb-4 leading-relaxed">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('learn', ${idx}, 'add')" class="flex-1 bg-[#2DCB8A]/20 hover:bg-[#2DCB8A] text-[#2DCB8A] hover:text-[#0D1A12] text-xs font-bold py-2.5 rounded-lg transition-colors">Add to Hub</button>
                                <button onclick="handlePlanAction('learn', ${idx}, 'ignore')" class="flex-1 bg-white/5 hover:bg-white/10 text-[#8890A0] hover:text-white text-xs font-bold py-2.5 rounded-lg transition-colors">Ignore</button>
                            </div>
                        </div>
                    `).join('')}
                    ${r.newPractice.map((item, idx) => `
                        <div class="bg-[#1A1A3A] p-4 rounded-xl border border-[#2DCB8A]/30 shadow-lg">
                            <span class="text-[10px] uppercase font-black text-[#2DCB8A] mb-2 block tracking-widest">New to Practice</span>
                            <p class="text-sm text-white mb-4 leading-relaxed">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('practice', ${idx}, 'add')" class="flex-1 bg-[#2DCB8A]/20 hover:bg-[#2DCB8A] text-[#2DCB8A] hover:text-[#0D1A12] text-xs font-bold py-2.5 rounded-lg transition-colors">Add to Hub</button>
                                <button onclick="handlePlanAction('practice', ${idx}, 'ignore')" class="flex-1 bg-white/5 hover:bg-white/10 text-[#8890A0] hover:text-white text-xs font-bold py-2.5 rounded-lg transition-colors">Ignore</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    let pithyAdviceHTML = '';
    if (r.pithyAdvice) {
        pithyAdviceHTML = `
            <div class="bg-[#1D7A5A]/20 p-6 rounded-2xl border border-[#2DCB8A]/40 mb-10 shadow-[0_0_15px_rgba(45,203,138,0.1)] text-center animate-fade-in">
                <div class="text-3xl mb-3">💡</div>
                <p class="text-[#F4F4F0] font-medium leading-relaxed italic text-lg">
                    "${r.pithyAdvice}"
                </p>
            </div>
        `;
    }

    let aiErrorBannerHTML = '';
    if (r.aiFailed) {
        aiErrorBannerHTML = `
            <div class="bg-[#E85030]/10 p-4 rounded-xl border border-[#E85030]/30 mb-8 shadow-sm flex items-start gap-3 animate-fade-in">
                <div class="text-[#E85030] text-xl mt-0.5">⚠️</div>
                <div class="w-full">
                    <div class="text-[#E85030] text-xs font-bold uppercase tracking-widest mb-1">AI Connection Failed</div>
                    <p class="text-[#E85030]/80 text-xs leading-relaxed mb-3">
                        Coach couldn't reach the analysis servers. Your data is saved safely, but we've generated baseline default drills and scores for this round.
                    </p>
                    <div class="bg-[#0D0D1E] p-3 rounded-lg border border-[#E85030]/20 text-[10px] text-[#E85030] font-mono break-words w-full">
                        <strong>Technical Details:</strong><br/>
                        ${r.aiErrorMessage || 'Unknown API Error'}
                    </div>
                </div>
            </div>
        `;
    }

    return `
    <div class="flex flex-col h-full bg-[#0D0D1E] animate-fade-in p-6 pb-24 overflow-y-auto hide-scrollbar">
        <div class="text-center mt-4 mb-8">
            <h1 class="text-sm font-black uppercase tracking-[0.2em] text-[#2DCB8A] mb-2">Round Summary</h1>
            <div class="flex justify-center items-baseline gap-4">
                <span class="text-7xl font-black text-white">${totalStrokes}</span>
                <span class="text-2xl font-bold ${toPar > 0 ? 'text-[#E85030]' : 'text-[#2DCB8A]'}">${toParStr}</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-[#1A1A3A] p-5 rounded-2xl border border-white/5 text-center">
                <div class="text-[10px] font-black text-[#404060] uppercase mb-1">Fairways Hit</div>
                <div class="text-3xl font-black text-white">${fairwayPct}%</div>
            </div>
            <div class="bg-[#1A1A3A] p-5 rounded-2xl border border-white/5 text-center">
                <div class="text-[10px] font-black text-[#404060] uppercase mb-1">Putts Per Green</div>
                <div class="text-3xl font-black text-white">${ppg}</div>
            </div>
        </div>

        ${aiErrorBannerHTML}

        <!-- AI Core Proficiency Scoring -->
        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-[#8890A0] mb-4">Round Proficiency (AI Score)</h3>
            <div class="bg-[#1A1A3A] p-6 rounded-2xl border border-[#2DCB8A]/20 space-y-4">
                ${r.roundProficiency ? Object.keys(r.roundProficiency).map(area => `
                    <div>
                        <div class="flex justify-between text-[10px] font-bold uppercase mb-1.5">
                            <span class="text-[#8890A0]">${area.replace(/([A-Z])/g, ' $1').trim()}</span>
                            <span class="text-[#2DCB8A]">${r.roundProficiency[area]}/5</span>
                        </div>
                        <div class="prof-bar-bg">
                            <div class="prof-bar-fill" style="width: ${(r.roundProficiency[area] / 5) * 100}%"></div>
                        </div>
                    </div>
                `).join('') : `
                    <div class="flex gap-2 items-center text-[#8890A0] py-4">
                        <div class="w-2 h-2 bg-[#2DCB8A] rounded-full animate-pulse"></div>
                        <span class="text-[10px] uppercase font-bold tracking-widest">Generating Proficiency Scores...</span>
                    </div>
                `}
            </div>
        </div>

        <div class="mb-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black uppercase tracking-widest text-[#8890A0]">Shot Distribution</h3>
                <select onchange="updateSummaryFilter(this.value)" class="bg-[#1A1A3A] text-white text-[10px] font-bold uppercase p-2 px-3 rounded-lg border border-white/10 outline-none">
                    <option value="All">All Clubs</option>
                    ${clubsInBag.map(c => `<option value="${c}" ${filteredClub === c ? 'selected' : ''}>${c}</option>`).join('')}
                </select>
            </div>

            ${isPutter ? `
                <div class="bg-[#1A1A3A] p-8 rounded-2xl border border-white/10 text-center">
                    <div class="text-[10px] font-black text-[#404060] uppercase mb-2">Total Putts</div>
                    <div class="text-6xl font-black text-white mb-6">${totalPutts}</div>
                    <div class="h-px bg-white/5 w-full mb-6"></div>
                    <div class="text-3xl font-black text-[#2DCB8A]">${ppg} PPG</div>
                </div>
            ` : `
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="stat-grid-box"><span class="stat-grid-label">Short L</span><span class="stat-grid-value">${getDistPct('Left', 'Short')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">Short M</span><span class="stat-grid-value">${getDistPct('Straight', 'Short')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">Short R</span><span class="stat-grid-value">${getDistPct('Right', 'Short')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">At Dist L</span><span class="stat-grid-value">${getDistPct('Left', 'At Dist')}</span></div>
                    <div class="stat-grid-box stat-grid-active"><span class="stat-grid-label">Target</span><span class="stat-grid-value">${getDistPct('Straight', 'At Dist')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">At Dist R</span><span class="stat-grid-value">${getDistPct('Right', 'At Dist')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">Long L</span><span class="stat-grid-value">${getDistPct('Left', 'Long')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">Long M</span><span class="stat-grid-value">${getDistPct('Straight', 'Long')}</span></div>
                    <div class="stat-grid-box"><span class="stat-grid-label">Long R</span><span class="stat-grid-value">${getDistPct('Right', 'Long')}</span></div>
                </div>
                <div class="bg-[#1A1A3A] p-4 rounded-xl flex justify-between items-center border border-white/5">
                    <span class="text-[10px] font-black text-[#404060] uppercase tracking-widest">OB Hits</span>
                    <span class="text-sm font-black text-[#E85030]">${allShots.filter(s => s.ob).length}</span>
                </div>
            `}
        </div>

        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-[#8890A0] mb-4">Hole Performance</h3>
            <div class="space-y-2">
                ${[3,4,5].map(p => {
                    const avg = parStats[p].c > 0 ? (parStats[p].s / parStats[p].c).toFixed(1) : '0.0';
                    const diff = (parseFloat(avg) - p).toFixed(1);
                    return `
                    <div class="bg-[#1A1A3A] p-4 rounded-xl flex justify-between items-center border border-white/5">
                        <div><span class="text-[10px] font-black text-[#404060] uppercase block mb-1">Par ${p} Avg</span><span class="text-lg font-black text-white">${avg}</span></div>
                        <div class="text-right"><span class="text-[10px] font-black text-[#404060] uppercase block mb-1">Vs Par</span><span class="text-lg font-black ${diff > 0 ? 'text-[#E85030]' : 'text-[#2DCB8A]'}">${diff > 0 ? '+' + diff : diff === '0.0' ? 'E' : diff}</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>

        ${pithyAdviceHTML}

        ${suggestionsHTML}

        <button onclick="switchView('progress')" class="w-full bg-[#1A1A3A] border border-white/10 text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-lg">Finalize & Sync</button>
    </div>`;
}

window.updateSummaryFilter = (val) => {
    STATE.activeRound.summaryFilter = val;
    render();
};

function renderProgress() {
    const pSg = STATE.player.sgStats || { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    const statsArr = [
        { label: 'Putting', value: pSg.putting, key: 'putting' },
        { label: 'Approach', value: pSg.approach, key: 'approach' },
        { label: 'Short Game', value: pSg.shortGame, key: 'shortGame' },
        { label: 'Off the Tee', value: pSg.offTee, key: 'offTee' }
    ];
    
    // Sort from worst (lowest) to best (highest) to highlight weak areas
    statsArr.sort((a, b) => a.value - b.value);
    
    // Auto-assign heat map colors based on rank inside the sorted array
    const rankColors = ['#E85030', '#E8A930', '#B8C830', '#2DCB8A'];
    statsArr.forEach((s, i) => s.color = rankColors[i]);

    // Calculate maximum absolute loss to scale widths proportionally
    const maxAbsVal = Math.max(0.1, ...statsArr.map(s => Math.abs(s.value)));

    return `
    <div class="flex flex-col h-full p-6 animate-fade-in">
        <h1 class="text-2xl font-serif font-bold mb-6">Progress</h1>
        ${STATE.player.roundCount === 0 ? `
            <div class="bg-[#E8A930]/10 p-4 rounded-xl border border-[#E8A930]/30 mb-6 shadow-sm">
                <p class="text-[#E8A930] text-sm leading-relaxed">
                    <strong>Welcome to Progress!</strong> Since you haven't logged a round yet, your Learn and Practice plans are based purely on your initial self-assessment. Play a round to start unlocking data-driven insights!
                </p>
            </div>
        ` : ''}
        <div class="bg-[#1A1A3A] border border-white/10 rounded-xl p-5 mb-4">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-[#8890A0] mb-1">Estimated SG (vs Scratch)</h3>
            <p class="text-xs text-[#8890A0] mb-6">Where you're losing strokes per round</p>
            <div class="space-y-4">
                ${statsArr.map(stat => `
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-xs font-bold text-[#F4F4F0]">${stat.label}</span>

window.suggestClubIndex = function(distance) {
    const bag = STATE.player.bag;
    if (distance <= 30) {
        const idx = bag.findIndex(c => c.id === 'putter');
        return idx >= 0 ? idx : 0;
    }
    let closestIdx = -1;
    let smallestDiff = Infinity;
    for (let i = 0; i < bag.length; i++) {
        if (bag[i].id === 'putter') continue;
        const diff = bag[i].distance - distance;
        if (diff >= 0 && diff < smallestDiff) {
            smallestDiff = diff;
            closestIdx = i;
        }
    }
    if (closestIdx === -1) {
        let maxDist = -1;
        for (let i = 0; i < bag.length; i++) {
            if (bag[i].id === 'putter') continue;
            if (bag[i].distance > maxDist) { maxDist = bag[i].distance; closestIdx = i; }
        }
    }
    return closestIdx === -1 ? 0 : closestIdx;
}

window.checkAchievements = function(roundData) {

    const addBadge = (title, icon) => { if (!a.some(x => x.title === title)) a.push({title, icon}); }
    
    if (STATE.player.roundCount === 1) addBadge("First Round Logged", "🏆");
    
    const totalScore = roundData.holes.reduce((sum, h) => sum + h.totalStrokes, 0);
    if (totalScore < 100) addBadge("Broke 100", "💯");
    if (totalScore < 90) addBadge("Broke 90", "🔥");
    if (totalScore < 80) addBadge("Broke 80", "🦅");
    
    const hasBirdie = roundData.holes.some(h => h.totalStrokes < h.par);
    if (hasBirdie) addBadge("Birdie Hunter", "🎯");
}

window.verifyPhone = async function() {
    const phone = document.getElementById('welcome-phone').value.trim();
    if (!phone) return;
    
    const btn = document.getElementById('welcome-next-btn');
    btn.innerText = "Checking...";
    btn.disabled = true;

    // Fast-path offline check
    if (!navigator.onLine) {
        const localStr = localStorage.getItem('descent_local_player');
        if (localStr) {
            const localData = JSON.parse(localStr);
            if (localData.phone === phone) {
                STATE.player = localData;
                switchView('learn');
                return;
            }
        }
    }

    if (db) {
        try {
            const snap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'profiles', phone));
            if (snap.exists()) { 
                STATE.player = { ...STATE.player, ...snap.data() }; 
                localStorage.setItem('descent_phone', phone);
                localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
                switchView('learn'); 
                return; 
            }
        } catch(e) {
            console.warn("Firebase check bypassed or failed:", e);
            // Fallback to local profile on DB timeout/error
            const localStr = localStorage.getItem('descent_local_player');
            if (localStr) {
                const localData = JSON.parse(localStr);
                if (localData.phone === phone) {
                    STATE.player = localData;
                    switchView('learn');
                    return;
                }
            }
        }
    }
    
    STATE.player.phone = phone;
    document.getElementById('welcome-step-1').classList.add('hidden');
    document.getElementById('welcome-step-2').classList.remove('hidden');
}

window.recordFairwayShot = () => {
    const r = STATE.activeRound;
    const hole = STATE.player.courseHoles[r.holeIndex];
    const club = STATE.player.bag[r.selectedClubIndex];
    const out = r.shotOutcomes;
    const shotNumber = r.currentHoleShots.length + 1;
    
    // Automatically track distance behind the scenes based on standard club yardages
    if (out.lie === 'Green') {
        if (shotNumber <= (hole.par - 2)) r.currentHoleIsGir = true;
        r.holeState = 'green';
    }

    r.currentHoleShots.push({ 
        club: club.name, direction: out.dir, distOut: out.dist, lie: out.lie, contact: out.cont, ob: out.ob, distance: club.distance
    });

    if (out.ob) r.penaltyStrokes += 1;
    
    if (r.holeState !== 'green') {
        const remaining = Math.max(0, r.currentShotDistance - club.distance);
        r.currentShotDistance = remaining;
        r.selectedClubIndex = suggestClubIndex(remaining);
        r.shotOutcomes = { dir: 'Straight', dist: 'At Dist', lie: 'Fairway', cont: 'Good Strike', ob: false };
    }
    render();
}

window.finishHoleWithPutts = async (count) => {
    const r = STATE.activeRound;
    const hole = STATE.player.courseHoles[r.holeIndex];
    const comment = document.getElementById('hole-comment')?.value || "";

    r.holesLog.push({
        number: hole.number, par: hole.par,
        shots: [...r.currentHoleShots], putts: count, penalties: r.penaltyStrokes,
        totalStrokes: r.currentHoleShots.length + count + r.penaltyStrokes,
        isGir: r.currentHoleIsGir, comment: comment
    });

    if (hole.number === 18) {
        switchView('post_round');
        
        // --- DYNAMIC STROKES GAINED UPDATE ---
        const roundSG = window.calculateRoundSG(r.holesLog);
        if (STATE.player.roundCount === 0) {
            STATE.player.sgStats = roundSG;
        } else {
            // Apply a 70% Historical / 30% Recent weighting to SG tracking
            STATE.player.sgStats.putting = (STATE.player.sgStats.putting * 0.7) + (roundSG.putting * 0.3);
            STATE.player.sgStats.offTee = (STATE.player.sgStats.offTee * 0.7) + (roundSG.offTee * 0.3);
            STATE.player.sgStats.shortGame = (STATE.player.sgStats.shortGame * 0.7) + (roundSG.shortGame * 0.3);
            STATE.player.sgStats.approach = (STATE.player.sgStats.approach * 0.7) + (roundSG.approach * 0.3);
        }

        // --- HISTORICAL MISS TRACKER UPDATE ---
        if (!STATE.player.historicalMisses) STATE.player.historicalMisses = {};
        r.holesLog.forEach(h => {
            h.shots.forEach(s => {
                if (s.club === 'Putter') return;
                if (!STATE.player.historicalMisses[s.club]) STATE.player.historicalMisses[s.club] = { Left:0, Right:0, Short:0, Long:0 };
                if (s.direction === 'Left') STATE.player.historicalMisses[s.club].Left++;
                if (s.direction === 'Right') STATE.player.historicalMisses[s.club].Right++;
                if (s.distOut === 'Short') STATE.player.historicalMisses[s.club].Short++;
                if (s.distOut === 'Long') STATE.player.historicalMisses[s.club].Long++;
            });
        });

        await performFinalAnalysis();
        await saveRoundToFirebase({ course: STATE.player.courseName, holes: r.holesLog, roundSG: roundSG });
    } else if (hole.number % 3 === 0) {
        switchView('coach_corner');
        r.isCoachTyping = true;
        
        const last3 = r.holesLog.slice(-3);
        const next3 = STATE.player.courseHoles.slice(r.holeIndex + 1, r.holeIndex + 4);
        const currentStats = {
            totalStrokes: r.holesLog.reduce((s, h) => s + h.totalStrokes, 0),
            toPar: r.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0),
            ppg: (r.holesLog.reduce((s, h) => s + h.putts, 0) / r.holesLog.length).toFixed(1),
            gir: Math.round((r.holesLog.filter(h => h.isGir).length / r.holesLog.length) * 100)
        };

        // Gather current round tendencies
        let roundMisses = { Left:0, Right:0, Short:0, Long:0 };
        r.holesLog.forEach(h => h.shots.forEach(s => {
            if(s.direction === 'Left') roundMisses.Left++;
            if(s.direction === 'Right') roundMisses.Right++;
            if(s.distOut === 'Short') roundMisses.Short++;
            if(s.distOut === 'Long') roundMisses.Long++;
        }));
        let topRoundMiss = Object.keys(roundMisses).reduce((a, b) => roundMisses[a] > roundMisses[b] ? a : b);
        let currentTendency = roundMisses[topRoundMiss] > 0 ? topRoundMiss : "None";
        
        // Gather historical tendencies
        let histStr = [];
        const hm = STATE.player.historicalMisses || {};
        for (let club in hm) {
            let maxMiss = ''; let maxCount = 0;
            for (let miss in hm[club]) {
                if (hm[club][miss] > maxCount) { maxCount = hm[club][miss]; maxMiss = miss; }
            }
            if (maxCount >= 2) histStr.push(`${club} tends to miss ${maxMiss}`);
        }
        let historyTendency = histStr.length > 0 ? histStr.slice(0, 3).join(', ') : "Not enough data.";

        const prompt = `PLAYER CONTEXT: Driving: ${STATE.player.coreAreas.driving}/5, Approach: ${STATE.player.coreAreas.approach}/5, Putting: ${STATE.player.coreAreas.putting}/5. ROUND DATA (Hole ${hole.number}): Score: ${currentStats.toPar >= 0 ? '+' + currentStats.toPar : currentStats.toPar}. Stats: ${currentStats.gir}% GIR, ${currentStats.ppg} PPG. TENDENCIES - Today's primary miss: ${currentTendency}. Historical: ${historyTendency}. NEXT 3: ${next3.map(h => `H${h.number}: P${h.par}, ${h.distance}y`).join('\n')}. INSTRUCTION: Act as a caddy. Give salient, specific strategy for the next 3 holes addressing their specific misses. You MUST end your response exactly with: "Here's one thing to think about for the next three holes: " followed by a pithy summary of your advice based on their data.`;

        const advice = await getAIAdvice(prompt);
        r.cornerMessages.push({ role: 'coach', text: advice });
        STATE.chatMessages.push({ role: 'coach', text: `Between Holes ${hole.number} & ${hole.number+1}: ${advice}` });
        r.isCoachTyping = false;
        
        setupNextHole(r);
        render();
    } else {
        setupNextHole(r);
        render();
    }
}

function setupNextHole(r) {
    r.holeIndex++;
    const nextHoleDist = STATE.player.courseHoles[r.holeIndex].distance;
    r.currentHoleShots = []; r.penaltyStrokes = 0; 
    r.selectedClubIndex = suggestClubIndex(nextHoleDist);
    r.currentShotDistance = nextHoleDist;
    r.holeState = 'fairway'; r.currentHoleIsGir = false;
    r.shotOutcomes = { dir: 'Straight', dist: 'At Dist', lie: 'Fairway', cont: 'Good Strike', ob: false };
}

    const inputEl = document.getElementById('corner-chat-input');

    STATE.activeRound.isCoachTyping = true;
    render();

    const advice = await getAIAdvice(`The player replied to your last advice with: "${text}". Give a 1-2 sentence response.`);
    STATE.activeRound.cornerMessages.push({ role: 'coach', text: advice });
    STATE.chatMessages.push({ role: 'coach', text: advice });
    STATE.activeRound.isCoachTyping = false;
    render();
}

window.returnToTee = function() {
    switchView('play_active');
}

window.setCoachMode = function(mode) { STATE.coachMode = mode; render(); }
window.sendChatMessage = async function() {
    const text = STATE.chatInput;
    if (!text || !text.trim()) return;
    STATE.chatMessages.push({ role: 'user', text: text.trim() });
    STATE.chatInput = ''; STATE.isTyping = true; render();
    
    const advice = await getAIAdvice(`The player asks: "${text}". Give a 1-2 sentence coaching response.`);
    STATE.chatMessages.push({ role: 'coach', text: advice });
    STATE.isTyping = false; render();
}

async function performFinalAnalysis() {
    const r = STATE.activeRound;
    const holeData = JSON.stringify(r.holesLog.map(h => ({
        hole: h.number, strokes: h.totalStrokes, putts: h.putts, gir: h.isGir,
        shots: h.shots.map(s => `${s.club}: ${s.distOut}, ${s.direction}, ${s.lie}`)
    })));

    const currentPlan = `Learning: ${STATE.player.customPlan.learn.join(' | ') || 'None'}. Practicing: ${STATE.player.customPlan.practice.join(' | ') || 'None'}.`;

    const prompt = `
    PLAYER CONTEXT: 
    - Baseline Abilities (1-5): Driving: ${STATE.player.coreAreas.driving}, Approach: ${STATE.player.coreAreas.approach}, Putting: ${STATE.player.coreAreas.putting}. 
    - Current Active Plan: ${currentPlan}.
    
    ROUND DATA: ${holeData}.
    
    INSTRUCTION: 
    1. Analyze the round data comparing it to their baseline and current plan. 
    2. Determine their round proficiency (1-5) for core areas FOR THIS ROUND ONLY.
    3. Based on the biggest weaknesses shown IN THIS ROUND and taking into account what they are already practicing/learning, generate 1 to 3 specific, actionable NEW things to learn (e.g., reading/video topics) and 1 to 3 NEW things to practice (e.g., specific drills).
    4. Provide a single, pithy summarizing thought for the next round based on their data.
    
    Return ONLY a valid JSON object:
    { 
      "coreScores": { "driving": score, "longIrons": score, "approach": score, "aroundGreen": score, "putting": score, "recovery": score },
      "newLearn": ["Specific learning topic 1"],
      "newPractice": ["Specific drill 1"],
      "pithyAdvice": "Here's one thing to think about for the next round: [your pithy summary advice]"
    }`;

    try {
        let responseText = await getAIAdvice(prompt, true);
        if (!responseText || responseText === "{}" || responseText === "") throw new Error("Empty AI Response");

        responseText = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
        const analysis = JSON.parse(responseText);
        r.roundProficiency = analysis.coreScores || { driving: 3, longIrons: 3, approach: 3, aroundGreen: 3, putting: 3, recovery: 3 };
        r.newLearn = analysis.newLearn || [];
        r.newPractice = analysis.newPractice || [];
        r.pithyAdvice = analysis.pithyAdvice || "Here's one thing to think about for the next round: Trust your swing and stick to the process.";
        r.aiFailed = false;
        r.aiErrorMessage = null;
        render();
    } catch(e) {
        console.error("Proficiency Analysis Error Details:", e);
        r.roundProficiency = { driving: 3, longIrons: 3, approach: 3, aroundGreen: 3, putting: 3, recovery: 3 };
        r.newLearn = ["Review course management basics."];
        r.newPractice = ["Hit 20 balls focusing purely on tempo."];
        r.pithyAdvice = "Here's one thing to think about for the next round: Focus on tempo and balance.";
        r.aiFailed = true;
        r.aiErrorMessage = e.message || String(e); // Capture technical error for the UI
        render();
    }
}

window.logout = () => { STATE.player = resetPlayerState(); switchView('welcome'); }

initFirebase().then(() => switchView('welcome'));

document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => switchView(btn.dataset.tab));

</script>
