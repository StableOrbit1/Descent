window.addEventListener('online', () => {
    console.log("Network restored. Syncing pending data...");
    if (window.syncPendingRounds) window.syncPendingRounds();
    if (localStorage.getItem('descent_pending_profile_sync') === 'true' && window.syncProfileToFirebase) {
        window.syncProfileToFirebase().then(() => localStorage.removeItem('descent_pending_profile_sync'));
    }
});

window.syncProfileToFirebase = async function() {
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
    if (!navigator.onLine || !db || !STATE.player.phone) {
        localStorage.setItem('descent_pending_profile_sync', 'true');
        return;
    }
    try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'profiles', STATE.player.phone);
        await setDoc(docRef, STATE.player, { merge: true });
        localStorage.removeItem('descent_pending_profile_sync');
    } catch (e) {
        console.error("Failed to sync profile:", e);
        localStorage.setItem('descent_pending_profile_sync', 'true');
    }
}

function savePendingRound(roundPayload) {
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    pending.push(roundPayload);
    localStorage.setItem('descent_pending_rounds', JSON.stringify(pending));
}

window.syncPendingRounds = async function() {
    if (!navigator.onLine || !db || !STATE.player.phone) return;
    let pending = JSON.parse(localStorage.getItem('descent_pending_rounds') || '[]');
    if (pending.length === 0) return;

    let remaining = [];
    for (let roundPayload of pending) {
        try {
            const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
            await addDoc(roundsCol, { ...roundPayload, syncedAt: new Date().toISOString() });
        } catch (e) {
            remaining.push(roundPayload);
        }
    }
    localStorage.setItem('descent_pending_rounds', JSON.stringify(remaining));
}

async function saveRoundToFirebase(roundData) {
    STATE.player.hasPlayedRound = true;
    STATE.player.roundCount++;
    window.checkAchievements(roundData);
    
    localStorage.setItem('descent_local_player', JSON.stringify(STATE.player));
    const roundPayload = { ...roundData, timestamp: new Date().toISOString() };

    if (!navigator.onLine || !db || !STATE.player.phone) {
        savePendingRound(roundPayload);
        return;
    }
    try {
        const roundsCol = collection(db, 'artifacts', appId, 'public', 'data', `rounds_${STATE.player.phone}`);
        await addDoc(roundsCol, roundPayload);
        await syncProfileToFirebase();
    } catch (e) {
        savePendingRound(roundPayload);
    }
}

async function getAIAdvice(promptText, requiresJson = false) {
    if (!navigator.onLine) {
        if (requiresJson) throw new Error("Network offline.");
        return "Coach is offline. Trust your swing and stick to your pre-shot routine.";
    }
    if (!vertexAI) {
        if (requiresJson) throw new Error("Vertex AI not initialized.");
        return "Coach is offline (Vertex AI not initialized).";
    }
    
    const instruction = requiresJson 
        ? "You are a professional golf data analyst. Return ONLY valid JSON. Strictly adhere to the requested schema. No prose."
        : "You are a professional golf 'Corner Man'. Give SALIENT, CRISP coaching advice. Format your response using basic HTML (like <strong> and <br>) for beautiful readability in a web app. Use emojis for bullet points instead of <ul>/<li>.";

    const modelConfig = { model: "gemini-2.5-flash", systemInstruction: instruction };
    if (requiresJson) modelConfig.generationConfig = { responseMimeType: "application/json" };

    try {
        const model = getGenerativeModel(vertexAI, modelConfig);
        const generate = async (retries = 3, delay = 1000) => {
            try {
                const result = await model.generateContent(promptText);
                const text = result.response.text();
                if (!text) throw new Error("Empty response from AI");
                return text;
            } catch (error) {
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, delay));
                    return generate(retries - 1, delay * 2);
                }
                throw error;
            }
        };
        return await generate();
    } catch (err) {
        if (requiresJson) throw err;
        return `AI Error: ${err.message || String(err)}.`;
    }
}

window.calculateRoundSG = function(holes) {
    let sg = { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    
    holes.forEach(h => {
        let strokes_lost = h.par - h.totalStrokes;
        let putting_sg = 2.0 - h.putts;
        let offTee_sg = 0;
        if (h.par > 3 && h.shots.length > 0) {
            let teeShot = h.shots[0];
            if (teeShot.ob) offTee_sg = -2.0;
            else if (teeShot.lie !== 'Fairway') offTee_sg = -0.5;
        }
        let shortGame_sg = 0;
        let shortShots = h.shots.filter(s => s.distance <= 50 && s.club !== 'Putter');
        if (shortShots.length > 1) { shortGame_sg = -(shortShots.length - 1); }
        shortShots.forEach(s => { if(s.ob) shortGame_sg -= 1.0; });
        let approach_sg = strokes_lost - (putting_sg + offTee_sg + shortGame_sg);

        sg.putting += putting_sg;
        sg.offTee += offTee_sg;
        sg.shortGame += shortGame_sg;
        sg.approach += approach_sg;
    });
    
    let scale = 18 / Math.max(1, holes.length);
    return {
        putting: sg.putting * scale,
        offTee: sg.offTee * scale,
        shortGame: sg.shortGame * scale,
        approach: sg.approach * scale
    };
}

window.switchView = function(viewName) {
    STATE.currentView = viewName;
    
    const container = document.getElementById('app-root');
    const scrollPos = container ? container.scrollTop : 0;
    
    render();
    
    const rootEl = document.getElementById('app-root');
    const navEl = document.getElementById('bottom-nav');
    
    if (viewName === 'checkin' || viewName === 'post_round' || viewName === 'practice' || viewName === 'learn' || viewName === 'progress') {
        if (rootEl) rootEl.scrollTop = scrollPos;
    }
    
    const hiddenViews = ['welcome', 'onboarding', 'welcome_sequence', 'play_active', 'post_round', 'coach_corner'];
    if (hiddenViews.includes(viewName)) {
        if(navEl) navEl.classList.add('hidden');
        if(rootEl) rootEl.classList.remove('pb-24');
    } else {
        if(navEl) {
            navEl.classList.remove('hidden');
            if(rootEl) rootEl.classList.add('pb-24');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if(btn.dataset.tab === viewName) {
                    btn.classList.remove('text-slate-400'); btn.classList.add('text-cyan-500');
                } else {
                    btn.classList.add('text-slate-400'); btn.classList.remove('text-cyan-500');
                }
            });
        }
    }
    
    if (viewName === 'coach' || viewName === 'coach_corner') {
        setTimeout(() => {
            const chatBox = document.getElementById(viewName === 'coach' ? 'chat-scroll-area' : 'corner-chat-area');
            if(chatBox) chatBox.scrollTop = chatBox.scrollHeight;
        }, 50);
    }
}

function render() {
    const rootEl = document.getElementById('app-root');
    if (!rootEl) return;

    let html = '';
    switch(STATE.currentView) {
        case 'welcome': html = renderWelcome(); break;
        case 'onboarding': html = renderOnboarding(); break;
        case 'welcome_sequence': html = renderWelcomeSequence(); break;
        case 'learn': html = renderLearn(); break;
        case 'practice': html = renderPractice(); break;
        case 'checkin': html = renderCheckIn(); break;
        case 'play': html = renderPlayIntro(); break;
        case 'play_active': html = renderPlayActive(); break;
        case 'coach_corner': html = renderCoachCorner(); break;
        case 'post_round': html = renderPostRound(); break;
        case 'progress': html = renderProgress(); break;
        case 'coach': html = renderCoach(); break;
    }
    
    rootEl.innerHTML = html;
}

function renderProgress() {
    const pSg = STATE.player.sgStats || { putting: 0, approach: 0, shortGame: 0, offTee: 0 };
    const statsArr = [
        { label: 'Putting', value: pSg.putting, key: 'putting' },
        { label: 'Approach', value: pSg.approach, key: 'approach' },
        { label: 'Short Game', value: pSg.shortGame, key: 'shortGame' },
        { label: 'Off the Tee', value: pSg.offTee, key: 'offTee' }
    ];
    
    statsArr.sort((a, b) => a.value - b.value);
    const rankColors = ['#EF4444', '#F59E0B', '#8B5CF6', '#06B6D4']; 
    statsArr.forEach((s, i) => s.color = rankColors[i]);
    const maxAbsVal = Math.max(0.1, ...statsArr.map(s => Math.abs(s.value)));

    return `
    <div class="flex flex-col h-full p-6 animate-fade-in">
        <h1 class="text-2xl font-serif font-bold mb-6 text-slate-900">Progress</h1>
        ${STATE.player.roundCount === 0 ? `
            <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-200 mb-6 shadow-sm">
                <p class="text-yellow-800 text-sm leading-relaxed font-medium">
                    <strong>Welcome to Progress!</strong> Play a round to start unlocking data-driven strokes gained insights!
                </p>
            </div>
        ` : ''}
        <div class="bg-white border border-slate-200 rounded-xl p-5 mb-4 shadow-sm">
            <h3 class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Estimated SG (vs Scratch)</h3>
            <p class="text-xs text-slate-500 mb-6 font-medium">Where you're losing strokes per round</p>
            <div class="space-y-4">
                ${statsArr.map(stat => `
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-xs font-bold text-slate-800">${stat.label}</span>
                        <div class="flex-1 h-2 bg-slate-100 border border-slate-200 rounded-full relative overflow-hidden"><div class="absolute top-0 left-0 h-full transition-all duration-1000" style="width: ${STATE.player.roundCount > 0 ? (Math.min(100, Math.abs(stat.value / maxAbsVal) * 100)) + '%' : '0%'}; background-color: ${stat.color}"></div></div>
                        <span class="w-10 text-right text-xs font-bold" style="color: ${stat.color}">${STATE.player.roundCount > 0 ? (stat.value > 0 ? '+' : '') + stat.value.toFixed(1) : '0.0'}</span>
                    </div>
                `).join('')}
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm"><div class="text-3xl font-black text-slate-900">${STATE.player.roundCount}</div><div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">Rounds Logged</div></div>
            <div class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm"><div class="text-3xl font-black text-slate-900">${STATE.player.sessionsCount}</div><div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-1">Total Sessions</div></div>

        </div>
        ${STATE.player.achievements.length > 0 ? `

function renderPostRound() {
    const r = STATE.activeRound;
    const holes = r.holesLog;
    const totalStrokes = holes.reduce((s, h) => s + h.totalStrokes, 0);
    const totalPar = holes.reduce((s, h) => s + h.par, 0);
    const toPar = totalStrokes - totalPar;
    const toParStr = toPar > 0 ? `+${toPar}` : toPar === 0 ? 'E' : toPar;

    const drivableHoles = holes.filter(h => h.par > 3);
    const fairwaysHit = drivableHoles.filter(h => h.shots[0]?.lie === 'Fairway').length;
    const fairwayPct = drivableHoles.length > 0 ? Math.round((fairwaysHit / drivableHoles.length) * 100) : 0;
    const totalPutts = holes.reduce((s, h) => s + h.putts, 0);
    const ppg = (totalPutts / holes.length).toFixed(1);
    const parStats = { 3: { s: 0, c: 0 }, 4: { s: 0, c: 0 }, 5: { s: 0, c: 0 } };
    holes.forEach(h => { parStats[h.par].s += h.totalStrokes; parStats[h.par].c++; });

    let allShots = [];
    holes.forEach(h => h.shots.forEach(s => allShots.push(s)));
    const getPct = (condFn) => allShots.length > 0 ? Math.round((allShots.filter(condFn).length / allShots.length) * 100) : 0;

    let suggestionsHTML = '';
    if (r.newLearn?.length > 0 || r.newPractice?.length > 0) {
        suggestionsHTML = `
            <div class="mb-10 animate-fade-in">
                <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Coach Plan Updates</h3>
                <div class="space-y-3">
                    ${r.newLearn.map((item, idx) => `
                        <div class="bg-white p-5 rounded-2xl border border-cyan-200 shadow-sm">
                            <span class="text-[10px] uppercase font-black text-cyan-500 mb-2 block tracking-widest">New to Learn</span>
                            <p class="text-sm text-slate-800 mb-4 leading-relaxed font-medium">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('learn', ${idx}, 'add')" class="flex-1 bg-cyan-50 hover:bg-cyan-100 text-cyan-600 font-bold py-2.5 rounded-lg transition-colors text-xs uppercase tracking-wider">Add to Hub</button>
                            </div>
                        </div>
                    `).join('')}
                    ${r.newPractice.map((item, idx) => `
                        <div class="bg-white p-5 rounded-2xl border border-cyan-200 shadow-sm">
                            <span class="text-[10px] uppercase font-black text-cyan-500 mb-2 block tracking-widest">New Drill</span>
                            <p class="text-sm text-slate-800 mb-4 leading-relaxed font-medium">${item}</p>
                            <div class="flex gap-2">
                                <button onclick="handlePlanAction('practice', ${idx}, 'add')" class="flex-1 bg-cyan-50 hover:bg-cyan-100 text-cyan-600 font-bold py-2.5 rounded-lg transition-colors text-xs uppercase tracking-wider">Add to Hub</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }

    let aiErrorBannerHTML = '';
    if (r.aiFailed) {
        aiErrorBannerHTML = `
            <div class="bg-red-50 p-4 rounded-xl border border-red-200 mb-8 shadow-sm flex items-start gap-3 animate-fade-in">
                <div class="text-red-500 text-xl mt-0.5">⚠️</div>
                <div class="w-full">
                    <div class="text-red-600 text-xs font-bold uppercase tracking-widest mb-1">AI Connection Failed</div>
                    <p class="text-red-500 text-xs leading-relaxed mb-3">Coach couldn't reach the analysis servers. Default drills added.</p>
                    <div class="bg-white p-3 rounded-lg border border-red-100 text-[10px] text-red-500 font-mono break-words w-full"><strong>Details:</strong><br/>${r.aiErrorMessage || 'Unknown'}</div>
                </div>
            </div>`;
    }

    return `
    <div class="flex flex-col h-full bg-slate-50 animate-fade-in p-6 pb-24 overflow-y-auto hide-scrollbar">
        <div class="text-center mt-4 mb-8">
            <h1 class="text-sm font-black uppercase tracking-[0.2em] text-cyan-500 mb-2">Round Summary</h1>
            <div class="flex justify-center items-baseline gap-4">
                <span class="text-7xl font-black text-slate-900">${totalStrokes}</span>
                <span class="text-2xl font-bold ${toPar > 0 ? 'text-red-500' : 'text-cyan-500'}">${toParStr}</span>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Fairways Hit</div>
                <div class="text-3xl font-black text-slate-800">${fairwayPct}%</div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 text-center shadow-sm">
                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Putts Per Green</div>
                <div class="text-3xl font-black text-slate-800">${ppg}</div>
            </div>
        </div>

        ${aiErrorBannerHTML}

        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Round Proficiency (AI Score)</h3>
            <div class="bg-white p-6 rounded-2xl border border-cyan-200 space-y-4 shadow-sm">
                ${r.roundProficiency ? Object.keys(STATE.player.coreAreas).map(area => {
                    const score = Math.max(1, Math.min(5, r.roundProficiency[area] || 3));
                    return `
                    <div>
                        <div class="flex justify-between text-[10px] font-bold uppercase mb-1.5">
                            <span class="text-slate-600">${CORE_AREA_INFO[area] ? area.replace(/([A-Z])/g, ' $1').trim() : area}</span>
                            <span class="text-cyan-500">${score}/5</span>
                        </div>
                        <div class="prof-bar-bg"><div class="prof-bar-fill" style="width: ${(score / 5) * 100}%"></div></div>
                    </div>`
                }).join('') : `<div class="text-center text-cyan-500 text-[10px] font-bold animate-pulse">Generating Scores...</div>`}
            </div>
        </div>

        <div class="mb-10">
            <h3 class="text-xs font-black uppercase tracking-widest text-slate-400 mb-4">Hole Performance</h3>
            <div class="space-y-2">
                ${[3,4,5].map(p => {
                    const avg = parStats[p].c > 0 ? (parStats[p].s / parStats[p].c).toFixed(1) : '0.0';
                    const diff = (parseFloat(avg) - p).toFixed(1);
                    return `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center border border-slate-200 shadow-sm">
                        <div><span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Par ${p} Avg</span><span class="text-lg font-black text-slate-800">${avg}</span></div>
                        <div class="text-right"><span class="text-[10px] font-black text-slate-400 uppercase block mb-1">Vs Par</span><span class="text-lg font-black ${diff > 0 ? 'text-red-500' : 'text-cyan-500'}">${diff > 0 ? '+' + diff : diff === '0.0' ? 'E' : diff}</span></div>
                    </div>`;
                }).join('')}
            </div>
        </div>

        ${r.pithyAdvice ? `
            <div class="bg-yellow-50 p-6 rounded-2xl border border-yellow-200 mb-10 text-center animate-fade-in shadow-sm">
                <div class="text-3xl mb-3">💡</div>
                <p class="text-slate-800 font-medium leading-relaxed italic text-lg">"${r.pithyAdvice}"</p>
            </div>
        ` : ''}

        ${suggestionsHTML}

        <button onclick="finalizeRound()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl uppercase tracking-widest shadow-lg transition-transform active:scale-95">Finalize & Sync</button>
    </div>`;
}

        historySection = `

    if (event && event.target && event.target.tagName && event.target.tagName.toLowerCase() === 'a') return;

    STATE.player.completedTasksSet[key] = !STATE.player.completedTasksSet[key];

window.updateBagDistance = function(clubName, dist) {
    const idx = STATE.player.bag.findIndex(c => c.name === clubName);
    if(idx >= 0) { STATE.player.bag[idx].distance = dist; STATE.player.bag.sort((a, b) => b.distance - a.distance); syncProfileToFirebase(); render(); }
}

window.removeBagClub = function(clubName) { STATE.player.bag = STATE.player.bag.filter(c => c.name !== clubName); syncProfileToFirebase(); render(); }

window.addNewBagClub = function(prefix) {
    const nameInput = document.getElementById(`${prefix}-new-club-name`); const distInput = document.getElementById(`${prefix}-new-club-dist`);
    if (!nameInput || !distInput) return;
    const name = nameInput.value.trim(); const dist = parseInt(distInput.value) || 0;
    if (name && dist > 0 && !STATE.player.bag.some(c => c.name.toLowerCase() === name.toLowerCase())) {
        const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
        STATE.player.bag.push({ id, name, distance: dist });
        STATE.player.bag.sort((a, b) => b.distance - a.distance);
        syncProfileToFirebase(); render();
    }
}

window.suggestClubIndex = function(distance) {
    const bag = STATE.player.bag;
    if (distance <= 30) { const idx = bag.findIndex(c => c.id === 'putter'); return idx >= 0 ? idx : 0; }
    let closestIdx = -1; let smallestDiff = Infinity;
    for (let i = 0; i < bag.length; i++) {
        if (bag[i].id === 'putter') continue;
        const diff = bag[i].distance - distance;
        if (diff >= 0 && diff < smallestDiff) { smallestDiff = diff; closestIdx = i; }
    }
    if (closestIdx === -1) {
        let maxDist = -1;
        for (let i = 0; i < bag.length; i++) {
            if (bag[i].id === 'putter') continue;
            if (bag[i].distance > maxDist) { maxDist = bag[i].distance; closestIdx = i; }
        }
    }
    return closestIdx === -1 ? 0 : closestIdx;
}

window.checkAchievements = function(roundData) {
    const a = STATE.player.achievements;
    const addBadge = (title, icon) => { if (!a.some(x => x.title === title)) a.push({title, icon}); }
    if (STATE.player.roundCount === 1) addBadge("First Round Logged", "🏆");
    const totalScore = roundData.holes.reduce((sum, h) => sum + h.totalStrokes, 0);
    if (totalScore < 100) addBadge("Broke 100", "💯");
    if (totalScore < 90) addBadge("Broke 90", "🔥");
    if (totalScore < 80) addBadge("Broke 80", "🦅");
    if (roundData.holes.some(h => h.totalStrokes < h.par)) addBadge("Birdie Hunter", "🎯");
}

    const phone = document.getElementById('welcome-phone').value.trim();

    const btn = document.getElementById('welcome-next-btn'); const errObj = document.getElementById('auth-error');

    try {
        if (!window.recaptchaVerifier) { window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' }); }
        const formattedPhone = phone.startsWith('+') ? phone : '+1' + phone.replace(/\D/g, '');
        await window.recaptchaVerifier.render();
        window.confirmationResult = await signInWithPhoneNumber(auth, formattedPhone, window.recaptchaVerifier);
        STATE.pendingPhone = formattedPhone; STATE.authStep = 'otp'; render();
    } catch (error) {
        console.error("SMS Error:", error);
        btn.innerText = "Send Code →"; btn.disabled = false; errObj.classList.remove('hidden');
        if (error.code === 'auth/unauthorized-domain') errObj.innerHTML = "Domain not authorized. Add to Firebase Console.";
        else if (error.code === 'auth/operation-not-allowed') errObj.innerHTML = "Phone Auth is not enabled in Firebase.";
        else errObj.innerHTML = "Error sending SMS. Try again.";
        if(window.recaptchaVerifier) { window.recaptchaVerifier.clear(); window.recaptchaVerifier = null; }
    }
}

window.recordFairwayShot = () => {
    const r = STATE.activeRound; const hole = STATE.player.courseHoles[r.holeIndex]; const club = STATE.player.bag[r.selectedClubIndex]; const out = r.shotOutcomes;
    r.currentHoleShots.push({ club: club.name, direction: out.dir, distOut: out.dist, lie: out.lie, contact: out.cont, ob: out.ob, distance: club.distance, _previousDistance: r.currentShotDistance, _previousPenalties: r.penaltyStrokes });
    if (out.ob) r.penaltyStrokes += 1;
    if (out.lie === 'Green') {
        if (r.currentHoleShots.length <= (hole.par - 2)) r.currentHoleIsGir = true;
        r.holeState = 'green';
    } else {
        const remaining = Math.max(0, r.currentShotDistance - club.distance);
        r.currentShotDistance = remaining; r.selectedClubIndex = suggestClubIndex(remaining); r.shotOutcomes = { dir: 'Straight', dist: 'At Dist', lie: 'Fairway', cont: 'Good Strike', ob: false };
    }
    saveLocalRoundState(); render();
}

window.undoLastShot = () => {
    const r = STATE.activeRound;
    if (!r || r.currentHoleShots.length === 0) return;
    if (r.holeState === 'green') { r.holeState = 'fairway'; r.currentHoleIsGir = false; }
    const lastShot = r.currentHoleShots.pop();
    r.currentShotDistance = lastShot._previousDistance; r.penaltyStrokes = lastShot._previousPenalties; r.selectedClubIndex = suggestClubIndex(r.currentShotDistance);

window.commitHole = async () => {
    const r = STATE.activeRound; const hole = STATE.player.courseHoles[r.holeIndex];
    r.penaltyStrokes = r.currentHoleShots.filter(s => s.ob).length; r.currentHoleIsGir = false;
    r.currentHoleShots.forEach((s, idx) => { if (s.lie === 'Green' && (idx + 1) <= (hole.par - 2)) r.currentHoleIsGir = true; });
    r.holesLog.push({ number: hole.number, par: hole.par, shots: JSON.parse(JSON.stringify(r.currentHoleShots)), putts: r.tempPuttCount, penalties: r.penaltyStrokes, totalStrokes: r.currentHoleShots.length + r.tempPuttCount + r.penaltyStrokes, isGir: r.currentHoleIsGir, comment: r.tempComment });

    if (hole.number === 18) {
        saveLocalRoundState(); 
        const roundSG = window.calculateRoundSG(r.holesLog);
        switchView('post_round');
        
        if (STATE.player.roundCount === 0) STATE.player.sgStats = roundSG;
        else {
            STATE.player.sgStats.putting = (STATE.player.sgStats.putting * 0.7) + (roundSG.putting * 0.3);
            STATE.player.sgStats.offTee = (STATE.player.sgStats.offTee * 0.7) + (roundSG.offTee * 0.3);
            STATE.player.sgStats.shortGame = (STATE.player.sgStats.shortGame * 0.7) + (roundSG.shortGame * 0.3);
            STATE.player.sgStats.approach = (STATE.player.sgStats.approach * 0.7) + (roundSG.approach * 0.3);
        }

        r.holesLog.forEach(h => h.shots.forEach(s => {
            if (s.club === 'Putter') return;
            if (!STATE.player.historicalMisses[s.club]) STATE.player.historicalMisses[s.club] = { Left:0, Right:0, Short:0, Long:0 };
            if (s.direction === 'Left') STATE.player.historicalMisses[s.club].Left++;
            if (s.direction === 'Right') STATE.player.historicalMisses[s.club].Right++;
            if (s.distOut === 'Short') STATE.player.historicalMisses[s.club].Short++;
            if (s.distOut === 'Long') STATE.player.historicalMisses[s.club].Long++;
        }));

        const totalStrokes = r.holesLog.reduce((s, h) => s + h.totalStrokes, 0);
        const toPar = totalStrokes - r.holesLog.reduce((s, h) => s + h.par, 0);
        STATE.player.roundHistory.unshift({ date: r.startTime, course: STATE.player.courseName, score: totalStrokes, toPar: toPar, ppg: (r.holesLog.reduce((s, h) => s + h.putts, 0) / r.holesLog.length).toFixed(1), fairwayPct: Math.round((r.holesLog.filter(h => h.par > 3 && h.shots[0]?.lie === 'Fairway').length / r.holesLog.filter(h => h.par > 3).length) * 100) || 0 });

        await saveRoundToFirebase({ course: STATE.player.courseName, holes: r.holesLog, roundSG: roundSG });
        await performFinalAnalysis(roundSG);
    } else if (hole.number % 3 === 0) {
        r.isCoachTyping = true; saveLocalRoundState(); switchView('coach_corner');
        const prompt = `PLAYER CONTEXT: Driving: ${STATE.player.coreAreas.driving}/5, Putting: ${STATE.player.coreAreas.putting}/5. Score: +${r.holesLog.reduce((s, h) => s + (h.totalStrokes - h.par), 0)}. INSTRUCTION: Act as a gritty caddy. Keep it SHORT (max 3 sentences). Provide 1 sharp strategic thought for the next 3 holes.`;
        const advice = await getAIAdvice(prompt);
        r.cornerMessages.push({ role: 'coach', text: advice }); STATE.chatMessages.push({ role: 'coach', text: `Between Holes ${hole.number} & ${hole.number+1}: ${advice}` });
        r.isCoachTyping = false; setupNextHole(r); saveLocalRoundState(); render();
    } else {
        setupNextHole(r); saveLocalRoundState(); render();
    }
}

function setupNextHole(r) {

async function performFinalAnalysis(roundSG) {
    const r = STATE.activeRound;
    const prompt = `INSTRUCTION: Analyze this golf round. Return ONLY valid JSON: { "coreScores": { "driving": 3, "longIrons": 3, "approach": 3, "aroundGreen": 3, "putting": 3, "recovery": 3 }, "newLearn": ["1 topic with <a href='...'>link</a>"], "newPractice": ["1 drill with <a href='...'>link</a>"], "pithyAdvice": "1 sentence advice." } CRITICAL: Provide EXACTLY 1-2 newLearn and EXACTLY 1-2 newPractice items targeting their weakest area.`;
    try {
        let responseText = await getAIAdvice(prompt, true);
        const analysis = JSON.parse(responseText.replace(/```json/gi, '').replace(/```/g, '').trim());
        const rawScores = analysis.coreScores || {}; const getScore = (key1, key2) => Number(rawScores[key1] || rawScores[key2]) || 3;
        r.roundProficiency = { driving: getScore('driving', 'Driving'), longIrons: getScore('longIrons', 'LongIrons'), approach: getScore('approach', 'Approach'), aroundGreen: getScore('aroundGreen', 'AroundGreen'), putting: getScore('putting', 'Putting'), recovery: getScore('recovery', 'Recovery') };
        r.newLearn = Array.isArray(analysis.newLearn) ? analysis.newLearn.slice(0, 2) : []; r.newPractice = Array.isArray(analysis.newPractice) ? analysis.newPractice.slice(0, 2) : []; r.pithyAdvice = analysis.pithyAdvice || "Trust your swing."; r.aiFailed = false;
        
        const scrollPos = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = scrollPos;
    } catch(e) {
        r.roundProficiency = { driving: 3, longIrons: 3, approach: 3, aroundGreen: 3, putting: 3, recovery: 3 }; r.newLearn = ["Review basics."]; r.newPractice = ["Hit 20 balls."]; r.pithyAdvice = "Focus on tempo."; r.aiFailed = true; r.aiErrorMessage = String(e);
        const scrollPos = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = scrollPos;
    }
}

window.handleGarminUpload = function(event) {
    const file = event.target.files[0]; if (!file) return;
    STATE.garminLoading = true; STATE.garminAILoading = true; STATE.garminError = null; STATE.garminSummary = null;
    const scrollPos = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = scrollPos;

    const reader = new FileReader();
    reader.onload = async function(e) {
        const text = e.target.result; const lines = text.split('\n').filter(l => l.trim() !== '');
        if (lines.length < 2) { STATE.garminError = 'Empty or invalid CSV.'; STATE.garminLoading = false; STATE.garminAILoading = false; render(); return; }

        const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
        const clubIdx = headers.findIndex(h => h.includes('club'));
        let distIdx = headers.findIndex(h => h.includes('total') || h.includes('distance'));
        if (distIdx === -1) distIdx = headers.findIndex(h => h.includes('carry'));
        const smashIdx = headers.findIndex(h => h.includes('smash'));

        if (clubIdx === -1 || distIdx === -1) { STATE.garminError = "Missing Club/Distance columns."; STATE.garminLoading = false; STATE.garminAILoading = false; render(); return; }

        let clubData = {}; let startIdx = lines.length > 1 && lines[1].includes('[') ? 2 : 1;
        for (let i = startIdx; i < lines.length; i++) {
            const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
            if (cols.length > Math.max(clubIdx, distIdx)) {
                const clubName = cols[clubIdx]; const dist = parseFloat(cols[distIdx]); const smash = smashIdx > -1 ? parseFloat(cols[smashIdx]) : null;
                if (clubName && !isNaN(dist) && dist > 0) {
                    if (!clubData[clubName]) clubData[clubName] = { distSum: 0, count: 0, smashSum: 0, smashCount: 0 };
                    clubData[clubName].distSum += dist; clubData[clubName].count += 1;
                    if (smash && !isNaN(smash)) { clubData[clubName].smashSum += smash; clubData[clubName].smashCount += 1; }
                }
            }
        }

        let averages = [];
        for (let club in clubData) {
            averages.push({ club, avgDist: Math.round(clubData[club].distSum / clubData[club].count), avgSmash: clubData[club].smashCount > 0 ? (clubData[club].smashSum / clubData[club].smashCount).toFixed(2) : 'N/A', count: clubData[club].count });
        }
        averages.sort((a, b) => b.avgDist - a.avgDist); STATE.garminAverages = averages; STATE.garminLoading = false; 
        
        let s2 = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = s2;

        const csvPayload = lines.length > 150 ? lines.slice(0, 2).join('\n') + '\n' + lines.slice(-148).join('\n') : text;
        const prompt = `System Role: Expert golf coach. Analyze this Garmin R10 CSV data. Return ONLY valid JSON: { "summary": "2 sentences.", "newLearn": ["1 topic with <a href='...'>link</a>"], "newPractice": ["1 drill with <a href='...'>link</a>"] }. CRITICAL: Provide EXACTLY 1-2 learn topics and EXACTLY 1-2 practice drills targeting their worst flaw. RAW DATA: ${csvPayload}`;
        try {
            let responseText = await getAIAdvice(prompt, true);
            const analysis = JSON.parse(responseText.replace(/```json/gi, '').replace(/```/g, '').trim());
            STATE.garminLearn = Array.isArray(analysis.newLearn) ? analysis.newLearn.slice(0, 2) : []; STATE.garminPractice = Array.isArray(analysis.newPractice) ? analysis.newPractice.slice(0, 2) : []; STATE.garminSummary = analysis.summary || "Garmin data analyzed.";
        } catch(err) { STATE.garminSummary = "Failed to analyze data via AI."; }

        STATE.garminAILoading = false;
        let s3 = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = s3;
    };
    reader.readAsText(file);
}

window.applyGarminDistances = function() {
    if (!STATE.garminAverages) return;
    let updated = 0;
    STATE.garminAverages.forEach(ga => {
        const gName = ga.club.toLowerCase().replace(/[^a-z0-9]/g, '');
        const bagClub = STATE.player.bag.find(c => { const bName = c.name.toLowerCase().replace(/[^a-z0-9]/g, ''); const bId = c.id.toLowerCase().replace(/[^a-z0-9]/g, ''); return bName === gName || bId === gName || bName.includes(gName) || gName.includes(bId); });
        if (bagClub) { bagClub.distance = ga.avgDist; updated++; }
    });
    if (updated > 0) { STATE.player.bag.sort((a, b) => b.distance - a.distance); syncProfileToFirebase(); STATE.garminAverages = null; STATE.garminSummary = `Successfully synced ${updated} distances into your Bag Map!`; render(); }
}

window.handleSwingAnalysis = async function() {
    const dtlFile = document.getElementById('dtl-video').files[0]; const faceOnFile = document.getElementById('face-on-video').files[0];
    if (!dtlFile || !faceOnFile) { STATE.videoAnalysisError = "Select both videos."; render(); return; }
    if (dtlFile.size > 15 * 1024 * 1024 || faceOnFile.size > 15 * 1024 * 1024) { STATE.videoAnalysisError = "Videos too large. Trim to 2s swing."; render(); return; }

    STATE.videoAnalysisStatus = "Preparing videos..."; STATE.videoAnalysisLoading = true; STATE.videoAnalysisError = null;
    const sPos = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = sPos;

    try {
        const fileToBase64 = (f) => new Promise((resolve) => { const r = new FileReader(); r.onload = () => resolve(r.result.split(',')[1]); r.readAsDataURL(f); });
        const dtlBase64 = await fileToBase64(dtlFile); const faceOnBase64 = await fileToBase64(faceOnFile);
        STATE.videoAnalysisStatus = "Analyzing Biomechanics..."; const sPos2 = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = sPos2;

        const prompt = `Analyze these 2 videos. Return ONLY valid JSON: { "summary": "2 sentences.", "newLearn": ["1 topic with <a href='...'>link</a>"], "newPractice": ["1 drill with <a href='...'>link</a>"] }. CRITICAL: Provide EXACTLY 1-2 learn topics and EXACTLY 1-2 practice drills targeting the biggest mechanical flaw.`;
        const model = getGenerativeModel(vertexAI, { model: "gemini-2.5-flash", systemInstruction: "Return valid JSON", generationConfig: { responseMimeType: "application/json" } });
        const result = await model.generateContent([{ inlineData: { data: dtlBase64, mimeType: dtlFile.type || "video/mp4" } }, { inlineData: { data: faceOnBase64, mimeType: faceOnFile.type || "video/mp4" } }, { text: prompt }]);
        
        const analysis = JSON.parse(result.response.text().replace(/```json/gi, '').replace(/```/g, '').trim());
        STATE.videoSummary = analysis.summary; STATE.videoLearn = Array.isArray(analysis.newLearn) ? analysis.newLearn.slice(0, 2) : []; STATE.videoPractice = Array.isArray(analysis.newPractice) ? analysis.newPractice.slice(0, 2) : [];
    } catch (err) { STATE.videoAnalysisError = "Analysis Failed: " + (err.message || "Unknown error"); }
    
    STATE.videoAnalysisLoading = false;
    const s3 = document.getElementById('app-root').scrollTop; render(); document.getElementById('app-root').scrollTop = s3;
}
